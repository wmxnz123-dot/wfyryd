<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人专属数据空间App - 首页原型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; }
        .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 70px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .bg-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
    </style>
</head>
<body>
<div class="mobile-view">
    <!-- Header -->
    <div class="bg-gradient text-white p-5 pb-8 rounded-b-3xl shadow-md">
        <div class="flex justify-between items-center mb-4">
            <div class="text-xl font-bold tracking-wider">我的个人专属数据空间</div>
            <div class="flex items-center space-x-4">
                <a href="app_scan_camera.html" class="text-white hover:text-blue-100 transition flex flex-col items-center">
                    <i class="fa-solid fa-expand text-xl"></i>
                </a>
                <a href="app_messages.html" class="relative">
                    <i class="fa-regular fa-bell text-xl"></i>
                    <span class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                </a>
            </div>
        </div>
        <p class="text-sm text-blue-100 opacity-90 mb-4">安全 · 便捷 · 自主管理</p>
    </div>

    <!-- Data Overview Card -->
    <div class="px-4 -mt-6 relative z-10">
        <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-bold text-gray-800 text-lg">我的数据资产</h3>
            </div>
            <div class="grid grid-cols-3 gap-2 text-center">
                <div>
                    <div class="text-xl font-bold text-blue-600 mb-1">45<span class="text-[10px] font-normal text-gray-500 ml-0.5">个</span></div>
                    <div class="text-xs text-gray-500">我的数据</div>
                </div>
                <div>
                    <div class="text-xl font-bold text-green-500 mb-1">12<span class="text-[10px] font-normal text-gray-500 ml-0.5">个</span></div>
                    <div class="text-xs text-gray-500">自有数据</div>
                </div>
                <div>
                    <div class="text-xl font-bold text-purple-500 mb-1">8<span class="text-[10px] font-normal text-gray-500 ml-0.5">次</span></div>
                    <div class="text-xs text-gray-500">授权记录</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Actions 1 (Modern Grid Style) -->
    <div class="px-4 mt-6">
        <div class="grid grid-cols-2 gap-3">
            <a href="app_my_data.html?tab=claimed" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between hover:shadow-md transition">
                <div>
                    <h4 class="font-bold text-gray-800 text-sm mb-1">我的数据</h4>
                    <p class="text-[10px] text-gray-500">查看已认领资产</p>
                </div>
                <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-lg">
                    <i class="fa-solid fa-database"></i>
                </div>
            </a>
            <a href="app_my_data.html?tab=unclaimed" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between hover:shadow-md transition relative">
               
                <div>
                    <h4 class="font-bold text-gray-800 text-sm mb-1">数据认领</h4>
                    <p class="text-[10px] text-gray-500">认领数据资产</p>
                </div>
                <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center text-lg">
                    <i class="fa-solid fa-download"></i>
                </div>
            </a>
            <a href="app_upload_list.html" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between hover:shadow-md transition">
                <div>
                    <h4 class="font-bold text-gray-800 text-sm mb-1">自有数据</h4>
                    <p class="text-[10px] text-gray-500">上传个人材料</p>
                </div>
                <div class="w-10 h-10 bg-green-50 text-green-600 rounded-full flex items-center justify-center text-lg">
                    <i class="fa-solid fa-upload"></i>
                </div>
            </a>
            <a href="app_my_auth.html?tab=pending" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-center justify-between hover:shadow-md transition relative">
               
                <div>
                    <h4 class="font-bold text-gray-800 text-sm mb-1">个人授权</h4>
                    <p class="text-[10px] text-gray-500">管理数据授权</p>
                </div>
                <div class="w-10 h-10 bg-purple-50 text-purple-600 rounded-full flex items-center justify-center text-lg">
                    <i class="fa-solid fa-key"></i>
                </div>
            </a>
        </div>
    </div>

    <!-- Data Services -->
    <div class="px-4 mt-4">
        <h3 class="font-bold text-gray-800 mb-3">数据服务</h3>
        <div class="grid grid-cols-4 gap-y-5 gap-x-4 bg-white p-4 rounded-xl shadow-sm border border-gray-100">
            <a href="app_service_education.html" class="flex flex-col items-center">
                <div class="w-10 h-10 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center text-lg mb-1.5">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <span class="text-xs text-gray-600">教育信息</span>
            </a>
            <a href="#" class="flex flex-col items-center">
                <div class="w-10 h-10 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center text-lg mb-1.5">
                    <i class="fa-solid fa-briefcase"></i>
                </div>
                <span class="text-xs text-gray-600">就业信息</span>
            </a>
            <a href="app_service_health.html" class="flex flex-col items-center">
                <div class="w-10 h-10 bg-green-50 text-green-500 rounded-full flex items-center justify-center text-lg mb-1.5">
                    <i class="fa-solid fa-heart-pulse"></i>
                </div>
                <span class="text-xs text-gray-600">健康信息</span>
            </a>
            <a href="#" class="flex flex-col items-center">
                <div class="w-10 h-10 bg-yellow-50 text-yellow-500 rounded-full flex items-center justify-center text-lg mb-1.5">
                    <i class="fa-solid fa-sack-dollar"></i>
                </div>
                <span class="text-xs text-gray-600">资产信息</span>
            </a>
        </div>
    </div>

    <!-- Applications (New Layout Style) -->
    <div class="px-4 mt-4 mb-6">
        <h3 class="font-bold text-gray-800 mb-3">应用服务</h3>
        <div class="space-y-3">

            <a href="app_service_gq_entry_report_list.html" class="block bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-gradient-to-br from-blue-100 to-indigo-50 rounded-xl flex items-center justify-center shadow-inner">
                            <i class="fa-solid fa-file-lines text-2xl text-blue-500"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-900 text-sm mb-1">国企入职调查报告</h4>
                            <p class="text-xs text-gray-500">生成报告并支持预览下载</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </div>
            </a>

            <a href="app_service_gq_entry_hr.html" class="block bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-gradient-to-br from-emerald-100 to-teal-50 rounded-xl flex items-center justify-center shadow-inner">
                            <i class="fa-solid fa-user-check text-2xl text-emerald-600"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-900 text-sm mb-1">国企入职核验HR端</h4>
                            <p class="text-xs text-gray-500">输入链接和密码查询报告，支持预览下载</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </div>
            </a>
            
            <a href="app_ai_chat.html" class="block bg-white p-4 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-gradient-to-br from-purple-100 to-indigo-50 rounded-xl flex items-center justify-center shadow-inner">
                            <i class="fa-solid fa-wand-magic-sparkles text-2xl text-purple-500"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-gray-900 text-sm mb-1">智能简历生成</h4>
                            <p class="text-xs text-gray-500">基于个人数据一键生成专业求职简历</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-chevron-right text-gray-300 text-sm"></i>
                </div>
            </a>
        </div>
    </div>

    <!-- Bottom Tab Bar -->
    <div class="fixed bottom-0 left-0 w-full flex justify-center z-50 pointer-events-none">
        <div class="w-full max-w-[390px] bg-white border-t border-gray-200 flex justify-around py-2 pointer-events-auto shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
            <a href="app_home.html" class="flex flex-col items-center text-blue-600 w-1/2">
                <i class="fa-solid fa-house text-xl mb-1"></i>
                <span class="text-[10px]">首页</span>
            </a>
            <a href="app_profile.html" class="flex flex-col items-center text-gray-400 hover:text-blue-600 w-1/2 border-l border-gray-100">
                <i class="fa-solid fa-user text-xl mb-1"></i>
                <span class="text-[10px]">我的</span>
            </a>
        </div>
    </div>
</div>
</body>
</html>
