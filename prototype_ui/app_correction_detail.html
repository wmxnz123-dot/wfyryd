<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>纠错详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 92px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <a href="app_correction_list.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold text-gray-900">纠错详情</div>
        <a href="./index.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-grid-2"></i>
        </a>
      </div>
    </div>

    <div class="px-4 mt-4 space-y-3">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 relative overflow-hidden">
        <!-- Decorative Background Element -->
        <div class="absolute top-0 right-0 w-24 h-24 bg-blue-50 rounded-bl-full -z-10 opacity-60"></div>
        <div class="flex items-start justify-between gap-3">
          <div>
            <div class="text-l font-bold text-gray-900 tracking-wide">基础身份信息</div>
          </div>
          <span class="text-[11px] px-2.5 py-1 rounded-full bg-orange-50 text-orange-600 border border-orange-100 h-fit font-medium">不予处理</span>
        </div>
        <div class="mt-3 pt-3 border-t border-gray-50 flex items-center text-xs text-gray-500">
          <i class="fa-regular fa-clock mr-1.5"></i>提交时间：2025-10-20 16:40
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900 border-b border-gray-100 pb-3">纠错内容</div>
        <div class="mt-3">
          <div class="text-xs text-gray-500 mb-2">问题说明</div>
          <div class="text-sm font-semibold text-gray-900 leading-relaxed bg-gray-50 p-3 rounded-lg border border-gray-100">
            号码已更换号码已更换号码已更换号码已更换号码已更换号码已更换号码已更换
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900 border-b border-gray-100 pb-3">证明材料</div>
        <div class="mt-3">
          <div class="text-xs text-gray-500 mb-2">已提交材料 <span class="text-gray-400 ml-1">(0 个)</span></div>
          <div class="flex items-center justify-between bg-gray-50 border border-gray-100 rounded-xl px-3 py-3">
            <div class="flex items-center gap-3">
              <div class="w-10 h-10 rounded-xl bg-white border border-gray-200 flex items-center justify-center text-gray-400">
                <i class="fa-solid fa-image"></i>
              </div>
              <div>
                <div class="text-sm font-semibold text-gray-600">无上传文件</div>
                <div class="text-xs text-gray-400 mt-1">建议下次补充相关证明材料</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900 border-b border-gray-100 pb-3">处理情况</div>
        <div class="mt-3">
          <div class="text-xs text-gray-500 mb-2">审核意见</div>
          <div class="text-sm text-orange-700 bg-orange-50 border border-orange-100 rounded-xl px-3 py-3 leading-relaxed">
            描述不准确，不予处理。
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
