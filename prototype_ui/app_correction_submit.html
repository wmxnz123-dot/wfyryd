<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>提交纠错</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 92px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <a href="app_item_detail.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold text-gray-900">提交纠错</div>
        <a href="./index.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-grid-2"></i>
        </a>
      </div>
    </div>

    <div class="px-4 mt-4 space-y-3">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 relative overflow-hidden">
        <!-- Decorative Background Element -->
        <div class="absolute top-0 right-0 w-24 h-24 bg-blue-50 rounded-bl-full -z-10 opacity-60"></div>
        <div class="text-xs text-blue-500 font-medium mb-1"><i class="fa-solid fa-folder-tree mr-1.5"></i>纠错对象</div>
        <div class="text-xl font-bold text-gray-900 mt-1 tracking-wide">基础身份数据</div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900"><span class="text-red-500 mr-1">*</span>纠错内容</div>
        <div class="mt-4">
          <label class="text-xs text-gray-500">详细描述问题</label>
          <textarea id="correctionContent" class="mt-2 w-full bg-white border border-gray-300 rounded-xl px-3 py-3 text-sm outline-none focus:border-blue-500" rows="3" placeholder="详细说明，10-200个字符"></textarea>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900"><span class="text-red-500 mr-1">*</span>联系方式</div>
        <div class="mt-4">
          <label class="text-xs text-gray-500">联系手机号</label>
          <input id="contactPhone" type="tel" value="13812341234" class="mt-2 w-full bg-white border border-gray-300 rounded-xl px-3 py-3 text-sm outline-none focus:border-blue-500 transition-colors">
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 relative">
        <div class="items-center justify-between">
          <div class="text-sm font-bold text-gray-900">证明材料 <span class="text-xs text-gray-400 font-normal ml-1">(选填)</span></div>
          <div class="mt-1"><span class="text-xs text-gray-400">支持 jpg, png, pdf 格式，最多5个，每个文件最大2MB</span></div>
        </div>
        <div class="mt-3 grid grid-cols-3 gap-3">
          <!-- Upload Button -->
          <div class="aspect-square rounded-xl bg-gray-50 border border-gray-200 flex flex-col items-center justify-center text-gray-500 cursor-pointer hover:bg-gray-100 transition" onclick="simulateUpload()">
            <i class="fa-solid fa-plus text-lg"></i>
            <div class="text-[10px] mt-2">添加</div>
          </div>
          <!-- Image Placeholder (Hidden by default) -->
          <div id="uploadedImage" class="hidden aspect-square rounded-xl border border-gray-200 relative overflow-hidden">
              <img src="https://via.placeholder.com/150?text=证明材料" class="w-full h-full object-cover">
              <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                  <i class="fa-solid fa-check text-white text-xl"></i>
              </div>
          </div>
          <div class="aspect-square rounded-xl bg-white border border-gray-200 flex items-center justify-center text-gray-400">
            <div class="text-xs">空位</div>
          </div>
        </div>
        
        <div class="mt-3 text-xs text-gray-500 leading-relaxed">
          建议上传能够证明修正信息的材料，以提升审核效率。
        </div>
      </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0">
      <div class="max-w-[390px] mx-auto bg-white border-t border-gray-200 px-4 py-3">
        <button onclick="submitCorrection()" class="w-full block text-center text-sm font-semibold text-white bg-orange-500 rounded-xl py-3 transition hover:bg-orange-600">提交纠错申请</button>
        <div class="mt-2 text-[11px] text-gray-500 text-center">提交后可在纠错记录中查看进度</div>
      </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-gray-800 text-white px-5 py-3 rounded-xl text-sm opacity-0 pointer-events-none transition-opacity duration-300 z-50 whitespace-nowrap shadow-lg">
      提示信息
    </div>
  </div>

  <script>
      function simulateUpload() {
          const img = document.getElementById('uploadedImage');
          // 只显示上传的图片，移除AI预审逻辑
          img.classList.remove('hidden');
      }

      function showToast(message) {
          const toast = document.getElementById('toast');
          toast.innerText = message;
          toast.classList.remove('opacity-0');
          setTimeout(() => {
              toast.classList.add('opacity-0');
          }, 2000);
      }

      function submitCorrection() {
          const content = document.getElementById('correctionContent').value.trim();
          const phone = document.getElementById('contactPhone').value.trim();

          if (!content) {
              showToast('请填写纠错内容');
              return;
          }
          if (content.length < 10) {
              showToast('纠错内容不能少于10个字符');
              return;
          }
          if (!phone) {
              showToast('请填写联系方式');
              return;
          }
          if (!/^1[3-9]\d{9}$/.test(phone)) {
              showToast('请填写正确的手机号');
              return;
          }

          // Validation passed
          window.location.href = './app_correction_list.html';
      }
  </script>
</body>
</html>
