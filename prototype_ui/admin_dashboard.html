<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一人一档后台管理系统 - 原型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">

        <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col h-full shrink-0">
    <div class="h-16 flex items-center px-6 border-b border-gray-800 shrink-0">
        <i class="fa-solid fa-cubes text-blue-500 text-2xl mr-3"></i>
        <span class="text-lg font-bold tracking-wider">一人一档后台</span>
    </div>
    <div class="flex-1 overflow-y-auto py-4">
                <ul class="space-y-1" id="sidebar-menu">
            <!-- 工作台 -->
            <li>
                <a href="admin_workbench.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <i class="fa-solid fa-desktop w-6"></i> <span class="ml-3">智能工作台</span>
                </a>
            </li>
            <!-- 数据检索管理 -->
            <li>
                <div class="flex items-center justify-between px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition cursor-pointer" onclick="toggleMenu(this)">
                    <div class="flex items-center">
                        <i class="fa-solid fa-magnifying-glass w-6"></i> <span class="ml-3">数据检索管理</span>
                    </div>
                    <i class="fa-solid fa-angle-down text-xs transition-transform duration-200"></i>
                </div>
                <ul class="pl-14 py-2 space-y-3 text-sm hidden bg-gray-800/50">

                    <li><a href="admin_dashboard.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">数据检索</a></li>
                    <li><a href="admin_dashboard_results.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">组合检索</a></li>
                    <li><a href="admin_tag_search.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">标签检索</a></li>
                    <li><a href="admin_data_map.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">数图分析</a></li>
                </ul>
            </li>
            <!-- 认领数据管理 -->
            <li>
                <div class="flex items-center justify-between px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition cursor-pointer" onclick="toggleMenu(this)">
                    <div class="flex items-center">
                        <i class="fa-solid fa-hand-holding-hand w-6"></i> <span class="ml-3">认领数据管理</span>
                    </div>
                    <i class="fa-solid fa-angle-down text-xs transition-transform duration-200"></i>
                </div>
                <ul class="pl-14 py-2 space-y-3 text-sm hidden bg-gray-800/50">
                    <li><a href="admin_catalog_config.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">目录管理</a></li>
                    <li><a href="admin_corrections.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">数据纠错处置</a></li>
                </ul>
            </li>
            <!-- 自有数据管理 -->
            <li>
                <a href="admin_own_data_catalog.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <i class="fa-solid fa-folder-open w-6"></i> <span class="ml-3">自有数据管理</span>
                </a>
            </li>
            <!-- 授权管理 -->
            <li>
                <div class="flex items-center justify-between px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition cursor-pointer" onclick="toggleMenu(this)">
                    <div class="flex items-center">
                        <i class="fa-solid fa-shield-halved w-6"></i> <span class="ml-3">授权管理</span>
                    </div>
                    <i class="fa-solid fa-angle-down text-xs transition-transform duration-200"></i>
                </div>
                <ul class="pl-14 py-2 space-y-3 text-sm hidden bg-gray-800/50">
                    <li><a href="admin_auth_templates.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">规则配置</a></li>
                    <li><a href="admin_auth_monitor.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">异常监控</a></li>
                    <li><a href="admin_auth_blockchain.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">可信存证服务</a></li>
                    <li><a href="admin_auth_records.html" class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full">授权记录</a></li>
                </ul>
            </li>
            <!-- 数据服务管理 -->
            <li>
                <a href="admin_services_config.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <i class="fa-solid fa-layer-group w-6"></i> <span class="ml-3">数据服务管理</span>
                </a>
            </li>
            <!-- 仪表盘配置 -->
                <li>
                    <a href="admin_profile_dashboard_config.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                        <i class="fa-solid fa-chart-pie w-6"></i> <span class="ml-3">仪表盘配置</span>
                    </a>
                </li>
            <!-- 监管统计 (Hidden) -->
                <li class="hidden">
                    <a href="admin_monitor_stats.html" class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition">
                    <i class="fa-solid fa-chart-line w-6"></i> <span class="ml-3">监管统计</span>
                </a>
            </li>
        </ul>
    </div>
</aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-full">
        <!-- Topbar -->
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-10">
            <div class="flex items-center text-gray-500">
                <i class="fa-solid fa-bars cursor-pointer hover:text-gray-800 mr-4"></i>
                <span class="text-sm">数据检索 <span class="mx-2">/</span> <span class="text-gray-800 font-medium">检索用户信息</span></span>
            </div>
            <div class="flex items-center space-x-4">
                
                <i class="fa-regular fa-bell text-gray-500 hover:text-gray-800 cursor-pointer text-lg mx-2"></i>
                <div class="flex items-center cursor-pointer ml-4 border-l border-gray-200 pl-4">
                    <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold mr-2">管</div>
                    <span class="text-sm font-medium">超级管理员</span>
                    <i class="fa-solid fa-angle-down text-gray-400 text-xs ml-2"></i>
                </div>
            </div>
        </header>

        <!-- Main Workspace -->
        <main class="flex-1 overflow-y-auto p-6 bg-gray-50 relative">
            <!-- Decorative Background Elements (Light Theme) -->
            <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
                <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-100/50 blur-[100px] rounded-full"></div>
                <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-indigo-100/50 blur-[100px] rounded-full"></div>
                <!-- Network Grid Pattern (Darker for light bg) -->
                <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMjAiIGN5PSIyMCIgcj0iMSIgZmlsbD0icmdiYSgwLDAsMCwwLjA1KSIvPjwvc3ZnPg==')] opacity-50"></div>
            </div>
            <div class="relative z-10 flex flex-col items-center justify-center min-h-full py-10">
                <div class="flex items-center justify-center space-x-4 text-sm mb-5 max-w-4xl">
                        <span class="text-gray-500"><i class="fa-solid fa-fire text-orange-500 mr-2"></i>热门搜索：</span>
                        <div class="flex flex-wrap justify-center gap-3">
                            <span class="px-4 py-1.5 bg-white hover:bg-gray-50 border border-gray-200 rounded-full text-gray-600 cursor-pointer transition-colors shadow-sm">高层次人才</span>
                            <span class="px-4 py-1.5 bg-white hover:bg-gray-50 border border-gray-200 rounded-full text-gray-600 cursor-pointer transition-colors shadow-sm">适龄入园儿童</span>
                            <span class="px-4 py-1.5 bg-white hover:bg-gray-50 border border-gray-200 rounded-full text-gray-600 cursor-pointer transition-colors shadow-sm">退役军人</span>
                            <span class="px-4 py-1.5 bg-white hover:bg-gray-50 border border-gray-200 rounded-full text-gray-600 cursor-pointer transition-colors shadow-sm">低保户群体</span>
                            <span class="px-4 py-1.5 bg-white hover:bg-gray-50 border border-gray-200 rounded-full text-gray-600 cursor-pointer transition-colors shadow-sm">高新技术企业</span>
                        </div>
                    </div>
                <!-- Main Search Bar (Combined Keyword & AI) -->
                <div class="w-full max-w-4xl bg-white rounded-2xl p-2 flex flex-col shadow-xl border border-blue-100 mb-12 relative group transition-all duration-300">
                    <!-- Search Input Area -->
                    <div class="flex items-center w-full px-2 py-1">
                        <div class="px-3 text-blue-500 flex items-center justify-center">
                            <i class="fa-solid fa-sparkles text-xl animate-pulse"></i>
                        </div>
                        <input type="text" placeholder="支持关键词检索，或输入自然语言（如：找出高新区65岁以上的老人）" class="flex-1 bg-transparent border-none outline-none px-2 py-4 text-gray-800 placeholder-gray-400 text-lg">
                        
                        <!-- AI Voice / Image Input options -->
                        <div class="flex items-center space-x-2 px-3 border-r border-gray-100 mr-3">
                            <button class="w-10 h-10 rounded-full text-gray-400 hover:text-blue-500 hover:bg-blue-50 flex items-center justify-center transition-colors" title="语音输入">
                                <i class="fa-solid fa-microphone text-lg"></i>
                            </button>
                            <button class="w-10 h-10 rounded-full text-gray-400 hover:text-blue-500 hover:bg-blue-50 flex items-center justify-center transition-colors" title="上传文件分析">
                                <i class="fa-solid fa-cloud-arrow-up text-lg"></i>
                            </button>
                        </div>

                        <!-- Main Search Button -->
                        <button class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white px-8 h-14 rounded-xl flex items-center justify-center shadow-md transition-all duration-200 transform group-hover:scale-[1.02] font-bold text-lg" onclick="window.location.href='admin_smart_search_results.html'">
                            智能检索
                        </button>
                    </div>
                    
                    <!-- Search Mode Indicators (Optional hints) -->
                    <div class="px-5 pb-2 pt-1 flex items-center justify-between text-xs text-gray-400">
                        <div class="flex items-center space-x-4">
                            <span class="flex items-center text-blue-500 font-medium bg-blue-50 px-2 py-1 rounded">
                                <i class="fa-solid fa-robot mr-1.5"></i> AI 语义引擎已激活
                            </span>
                            <span>自动识别关键词与自然语言意图</span>
                        </div>
                    </div>
                </div>

                <!-- Feature Cards -->
                <div class="grid grid-cols-3 gap-8 w-full max-w-4xl mb-16">
                    <!-- Card 1 (Combined) -->
                    <button class="bg-white hover:bg-blue-50/50 border border-gray-200 rounded-2xl p-6 flex flex-col items-center text-center shadow-sm hover:shadow-md transition-all duration-300 transform hover:-translate-y-1 group" onclick="window.location.href='admin_dashboard_results.html'">
                        <div class="w-16 h-16 rounded-full bg-blue-100 flex items-center justify-center mb-4 group-hover:bg-blue-200 transition-colors">
                            <i class="fa-solid fa-layer-group text-3xl text-blue-600"></i>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2">组合检索</h3>
                        <p class="text-xs text-gray-500">多条件、多维度、基于画像标签的交叉组合筛选</p>
                    </button>

                    <!-- Card 2 (Advanced) -->
                    <button class="bg-white hover:bg-purple-50/50 border border-gray-200 rounded-2xl p-6 flex flex-col items-center text-center shadow-sm hover:shadow-md transition-all duration-300 transform hover:-translate-y-1 group" onclick="alert('该功能正在建设中，敬请期待！')">
                        <div class="w-16 h-16 rounded-full bg-purple-100 flex items-center justify-center mb-4 group-hover:bg-purple-200 transition-colors">
                            <i class="fa-solid fa-filter text-3xl text-purple-600"></i>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2">高级检索</h3>
                        <p class="text-xs text-gray-500">通过复杂逻辑表达式进行深度挖掘</p>
                    </button>

                    <!-- Card 3 (Tag Search) -->
                    <button class="bg-white hover:bg-amber-50/50 border border-gray-200 rounded-2xl p-6 flex flex-col items-center text-center shadow-sm hover:shadow-md transition-all duration-300 transform hover:-translate-y-1 group" onclick="window.location.href='admin_tag_search.html'">
                        <div class="w-16 h-16 rounded-full bg-amber-100 flex items-center justify-center mb-4 group-hover:bg-amber-200 transition-colors">
                            <i class="fa-solid fa-tags text-3xl text-amber-600"></i>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 mb-2">标签检索</h3>
                        <p class="text-xs text-gray-500">基于画像标签进行智能检索</p>
                    </button>
                </div>



            </div>
        </main>
    </div>


  
<script src="admin_sidebar_logic.js"></script>
</body>
</html>
