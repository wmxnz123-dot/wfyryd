<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫一扫 - 个人专属数据空间App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; }
        .mobile-view { 
            max-width: 390px; 
            margin: 0 auto; 
            background-color: #000; 
            min-height: 100vh; 
            position: relative; 
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        /* 扫描框样式 */
        .scan-box {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 260px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.6);
            z-index: 10;
        }
        /* 四个角的修饰 */
        .scan-box::before, .scan-box::after,
        .scan-box span::before, .scan-box span::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: #3b82f6;
            border-style: solid;
        }
        .scan-box::before { top: -1px; left: -1px; border-width: 3px 0 0 3px; }
        .scan-box::after { top: -1px; right: -1px; border-width: 3px 3px 0 0; }
        .scan-box span::before { bottom: -1px; left: -1px; border-width: 0 0 3px 3px; }
        .scan-box span::after { bottom: -1px; right: -1px; border-width: 0 3px 3px 0; }
        
        /* 扫描线动画 */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, #3b82f6, transparent);
            box-shadow: 0 0 10px #3b82f6;
            animation: scan 2s linear infinite;
            z-index: 11;
        }
        
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 260px; opacity: 0; }
        }

        /* 背景网格装饰，模拟相机背景 */
        .camera-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: 1;
            opacity: 0.3;
        }
    </style>
</head>
<body>
<div class="mobile-view">
    <!-- Camera Background Simulation -->
    <div class="camera-bg"></div>

    <!-- Topbar -->
    <div class="px-4 py-4 flex items-center justify-between absolute top-0 w-full z-50">
        <a href="app_home.html" class="w-10 h-10 bg-black/30 backdrop-blur-md rounded-full flex items-center justify-center text-white">
            <i class="fa-solid fa-angle-left text-xl"></i>
        </a>
        <h1 class="text-lg font-bold text-white tracking-wide shadow-sm">扫一扫</h1>
        <button class="w-10 h-10 bg-black/30 backdrop-blur-md rounded-full flex items-center justify-center text-white">
            <i class="fa-solid fa-bolt text-lg"></i>
        </button>
    </div>

    <!-- Scan Area -->
    <div class="scan-box">
        <span></span>
        <div class="scan-line"></div>
    </div>

    <!-- Text Prompt -->
    <div class="absolute top-[65%] w-full text-center z-50">
        <p class="text-white/80 text-sm font-medium tracking-wide bg-black/40 inline-block px-4 py-1.5 rounded-full backdrop-blur-sm">
            将二维码放入框内，即可自动扫描
        </p>
    </div>

    <!-- Bottom Actions -->
    <div class="absolute bottom-10 w-full flex justify-center space-x-12 z-50">
        <div class="flex flex-col items-center">
            <div class="w-14 h-14 bg-black/40 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-white/20 mb-2 cursor-pointer hover:bg-white/20 transition">
                <i class="fa-regular fa-image text-xl"></i>
            </div>
            <span class="text-white/80 text-xs">相册</span>
        </div>
    </div>

    <!-- Loading Overlay (Shows after 2s, just before redirect) -->
    <div id="loadingOverlay" class="absolute inset-0 bg-black/80 z-50 hidden flex-col items-center justify-center">
        <i class="fa-solid fa-circle-notch fa-spin text-blue-500 text-4xl mb-4"></i>
        <p class="text-white font-medium">正在识别数据...</p>
    </div>
</div>

<script>
    // 模拟扫码过程，1秒后跳转到健康信息扫码结果页
    setTimeout(() => {
        // 显示加载动画
        document.getElementById('loadingOverlay').classList.remove('hidden');
        document.getElementById('loadingOverlay').classList.add('flex');
        
        // 稍微延迟后跳转，让用户看到“正在识别”的状态
        setTimeout(() => {
            window.location.href = 'app_scan_result_health.html';
        }, 500);
        
    }, 500);
</script>
</body>
</html>
