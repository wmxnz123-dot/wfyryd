<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自有数据-上传/编辑</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 92px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <a href="app_upload_list.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold text-gray-900">上传/编辑自有数据</div>
        <a href="./index.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-grid-2"></i>
        </a>
      </div>
    </div>

    <div class="px-4 mt-4 space-y-3">
      <!-- 政务数据收集选项 -->
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex items-center justify-between">
        <div class="text-sm font-bold text-gray-900">是否用于政务数据收集</div>
        <div class="flex items-center space-x-4">
          <label class="flex items-center cursor-pointer">
            <input type="radio" name="is_gov_data" value="yes" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500">
            <span class="ml-2 text-sm text-gray-700">是</span>
          </label>
          <label class="flex items-center cursor-pointer">
            <input type="radio" name="is_gov_data" value="no" class="w-4 h-4 text-blue-600 border-gray-300 focus:ring-blue-500" checked>
            <span class="ml-2 text-sm text-gray-700">否</span>
          </label>
        </div>
      </div>

      <!-- Data Fields Container -->
      <div id="dataItemsContainer" class="space-y-3">
          <!-- Item Card 1 -->
          <div class="data-item-card bg-white rounded-xl border border-gray-100 shadow-sm p-4 relative">
            <div class="flex justify-between items-center mb-3">
                <div class="text-sm font-bold text-gray-900 item-title">数据内容 #1</div>
                <button class="text-red-500 text-xs hidden delete-btn" onclick="removeItem(this)"><i class="fa-solid fa-trash-can mr-1"></i>删除</button>
            </div>
            
            <div class="dynamic-fields">
                <div class="mt-3">
                  <label class="text-xs text-gray-500">标题（必填）</label>
                  <input class="form-title mt-2 w-full bg-white border border-gray-300 rounded-xl px-3 py-3 text-sm outline-none focus:border-blue-500 transition-colors" placeholder="请输入标题">
                </div>
                <div class="mt-4">
                  <label class="text-xs text-gray-500">备注（可选）</label>
                  <textarea class="form-desc mt-2 w-full bg-white border border-gray-300 rounded-xl px-3 py-3 text-sm outline-none focus:border-blue-500 transition-colors" rows="2" placeholder="补充说明..."></textarea>
                </div>
            </div>
            
            <!-- Upload Attachment Area inside Card -->
            <div class="mt-4 pt-4 border-t border-gray-100">
              <div class="flex items-center justify-between mb-3">
                <div class="text-xs font-bold text-gray-700">上传附件</div>
              </div>
              <div class="grid grid-cols-3 gap-3 upload-container">
                <div class="aspect-square rounded-xl bg-gray-50 border border-gray-200 flex flex-col items-center justify-center text-gray-500 cursor-pointer hover:bg-gray-100 transition" onclick="simulateUpload(this)">
                  <i class="fa-solid fa-plus text-lg"></i>
                  <div class="text-[10px] mt-2">添加</div>
                </div>
                <!-- Uploaded File Icon (Hidden by default) -->
                <div class="uploaded-file hidden aspect-square rounded-xl bg-gray-50 border border-gray-200 flex flex-col items-center justify-center text-gray-700 relative">
                    <i class="fa-solid fa-file text-2xl"></i>
                    <div class="text-[10px] mt-2 truncate w-full px-2 text-center file-name">文件.pdf</div>
                </div>
                <div class="aspect-square rounded-xl bg-white border border-gray-200 flex items-center justify-center text-gray-400">
                  <div class="text-xs">空位</div>
                </div>
              </div>
            </div>
          </div>
      </div>

      <!-- Add New Item Button -->
      <button id="addMoreBtn" class="w-full bg-blue-50 border border-blue-200 text-blue-600 font-medium py-3 rounded-xl flex items-center justify-center transition hover:bg-blue-100" onclick="addNewItem()">
          <i class="fa-solid fa-plus mr-2"></i> 继续添加一条记录
      </button>
    </div>

    <div class="fixed bottom-0 left-0 right-0">
      <div class="max-w-[390px] mx-auto bg-white border-t border-gray-200 px-4 py-3">
        <a href="./app_upload_list.html" class="block text-center text-sm font-semibold text-white bg-green-600 rounded-xl py-3">提交上传</a>
        <div class="mt-2 text-[11px] text-gray-500 text-center">提交后将进入自有数据管理</div>
      </div>
    </div>
  </div>

  <script>
      let itemCount = 1;

      function addNewItem() {
          itemCount++;
          const container = document.getElementById('dataItemsContainer');
          const firstItem = container.firstElementChild;
          const newItem = firstItem.cloneNode(true);
          
          // Clear inputs in cloned node
          newItem.querySelectorAll('input, textarea').forEach(el => el.value = '');
          
          // Reset uploaded file state in cloned node
          const uploadedFile = newItem.querySelector('.uploaded-file');
          if(uploadedFile) {
              uploadedFile.classList.add('hidden');
              uploadedFile.classList.remove('bg-blue-50', 'border-blue-100', 'text-blue-500');
              uploadedFile.classList.add('bg-gray-50', 'border-gray-200', 'text-gray-700');
          }
          
          container.appendChild(newItem);
          updateItemTitles();
      }

      function removeItem(btn) {
          const card = btn.closest('.data-item-card');
          card.remove();
          updateItemTitles();
      }

      function updateItemTitles() {
          const items = document.querySelectorAll('.data-item-card');
          items.forEach((item, index) => {
              // Update title number
              const title = item.querySelector('.item-title');
              title.innerText = `数据内容 #${index + 1}`;
              
              // Show/Hide delete button
              const delBtn = item.querySelector('.delete-btn');
              if (items.length > 1) {
                  delBtn.classList.remove('hidden');
              } else {
                  delBtn.classList.add('hidden');
              }
          });
      }

      function simulateUpload(btn) {
          const uploadContainer = btn.closest('.upload-container');
          const pdfIcon = uploadContainer.querySelector('.uploaded-file');
          const fileName = pdfIcon.querySelector('.file-name');
          
          // Simple loading simulation
          pdfIcon.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin text-blue-500 text-2xl"></i><div class="text-[10px] mt-2">上传中...</div>`;
          pdfIcon.classList.remove('hidden');
          
          setTimeout(() => {
              pdfIcon.innerHTML = `
                  <i class="fa-solid fa-file text-2xl"></i>
                  <div class="text-[10px] mt-2 truncate w-full px-2 text-center file-name">文件.pdf</div>
              `;
              pdfIcon.classList.remove('bg-gray-50', 'border-gray-200', 'text-gray-700');
              pdfIcon.classList.add('bg-blue-50', 'border-blue-100', 'text-blue-500');
          }, 1000);
      }
  </script>
</body>
</html>
