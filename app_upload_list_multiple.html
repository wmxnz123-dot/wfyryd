<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自有数据-手机号变更证明列表</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 24px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <!-- Header -->
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <a href="app_upload_list.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700 hover:bg-gray-200 transition">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold text-gray-900 absolute left-1/2 -translate-x-1/2">手机号变更证明</div>
        <a href="app_upload_form.html" class="text-sm font-medium text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg hover:bg-blue-100 transition flex items-center">
          <i class="fa-solid fa-plus mr-1"></i> 新增
        </a>
      </div>
    </div>

    <!-- Content -->
    <div class="px-4 mt-4 space-y-3">
      
      <div class="flex justify-between items-center mb-2 px-1">
          <div class="text-sm text-gray-600">
              共包含 <span class="font-bold text-blue-600 text-lg mx-1">2</span> 条数据记录
          </div>
      </div>

      <!-- Item 1 -->
      <a href="app_upload_detail.html" class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4 relative hover:shadow-md transition group">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-3 flex-1">
            <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center shrink-0">
              <i class="fa-solid fa-file-lines text-lg"></i>
            </div>
            <div>
              <div class="text-sm font-bold text-gray-900 mb-1 flex items-center">
                <span class="text-gray-500 font-normal mr-2">证明类型:</span>运营商截图
              </div>
              <div class="text-xs text-gray-500 flex items-center">
                <i class="fa-regular fa-clock mr-1.5 text-gray-400"></i> 更新时间：2025-10-20 16:45
              </div>
            </div>
          </div>
          <div class="shrink-0 text-gray-300 group-hover:text-blue-500 transition">
            <i class="fa-solid fa-chevron-right text-sm"></i>
          </div>
        </div>
      </a>

      <!-- Item 2 -->
      <a href="app_upload_detail.html" class="block bg-white rounded-xl border border-gray-100 shadow-sm p-4 relative hover:shadow-md transition group">
        <div class="flex items-center justify-between gap-3">
          <div class="flex items-center gap-3 flex-1">
            <div class="w-10 h-10 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center shrink-0">
              <i class="fa-solid fa-file-lines text-lg"></i>
            </div>
            <div>
              <div class="text-sm font-bold text-gray-900 mb-1 flex items-center">
                <span class="text-gray-500 font-normal mr-2">证明类型:</span>业务办理回执单
              </div>
              <div class="text-xs text-gray-500 flex items-center">
                <i class="fa-regular fa-clock mr-1.5 text-gray-400"></i> 更新时间：2025-08-15 09:30
              </div>
            </div>
          </div>
          <div class="shrink-0 text-gray-300 group-hover:text-blue-500 transition">
            <i class="fa-solid fa-chevron-right text-sm"></i>
          </div>
        </div>
      </a>

    </div>
  </div>
</body>
</html>
