<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自有数据详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { background-color: #f3f4f6; }
    .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 92px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="mobile-view">
    <div class="bg-white px-4 py-4 border-b border-gray-100 sticky top-0 z-10">
      <div class="flex items-center justify-between">
        <a href="javascript:history.back()" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>
        <div class="text-base font-semibold text-gray-900">手机号变更证明</div>
        <a href="./index.html" class="w-9 h-9 bg-gray-100 rounded-full flex items-center justify-center text-gray-700">
          <i class="fa-solid fa-grid-2"></i>
        </a>
      </div>
    </div>

    <div class="px-4 mt-4 space-y-3">
      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="text-sm font-bold text-gray-900">基本信息</div>
        <div class="mt-3 grid grid-cols-2 gap-3">
          <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
            <div class="text-xs text-gray-500">目录</div>
            <div class="text-sm font-semibold text-gray-900 mt-1">证明材料</div>
          </div>
          <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
            <div class="text-xs text-gray-500">提交时间</div>
            <div class="text-sm font-semibold text-gray-900 mt-1">2025-10-20 16:45</div>
          </div>
        </div>
        <div class="mt-3 bg-gray-50 border border-gray-100 rounded-xl p-3">
          <div class="text-xs text-gray-500">是否用于政务数据收集</div>
          <div class="text-sm font-semibold text-gray-900 mt-1">否</div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex justify-between items-center">
            <div class="text-sm font-bold text-gray-900">字段信息</div>
            <button id="toggleEye" class="text-gray-400 hover:text-gray-600 focus:outline-none transition">
                <i id="eyeIcon" class="fa-solid fa-eye-slash text-lg"></i>
            </button>
        </div>
        <div class="mt-3 divide-y divide-gray-100">
          <div class="py-3 flex items-start justify-between gap-4">
            <div class="text-xs text-gray-500">证明类型</div>
            <div class="text-sm font-semibold text-gray-900 text-right" id="val-type">运营***</div>
          </div>
          <div class="py-3 flex items-start justify-between gap-4">
            <div class="text-xs text-gray-500">关联事项</div>
            <div class="text-sm font-semibold text-gray-900 text-right">纠错补充材料</div>
          </div>
          <div class="py-3 flex items-start justify-between gap-4">
            <div class="text-xs text-gray-500">备注</div>
            <div class="text-sm font-semibold text-gray-900 text-right" id="val-remark">用于****纠错</div>
          </div>
        </div>
      </div>

      <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="flex items-center justify-between">
          <div class="text-sm font-bold text-gray-900">附件</div>
          <span class="text-xs text-gray-400">1 个</span>
        </div>
        <div class="mt-3 flex items-center justify-between bg-gray-50 border border-gray-100 rounded-xl px-3 py-3">
          <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-white border border-gray-200 flex items-center justify-center text-gray-600">
              <i class="fa-solid fa-image"></i>
            </div>
            <div>
              <div class="text-sm font-semibold text-gray-900">proof.png</div>
              <div class="text-xs text-gray-500 mt-1">图片 · 320KB</div>
            </div>
          </div>
          <span class="text-sm font-semibold text-blue-600 cursor-pointer" onclick="openPreview()">预览</span>
        </div>
      </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0">
      <div class="max-w-[390px] mx-auto bg-white border-t border-gray-200 px-4 py-3">
        <div class="flex gap-3">
          <a href="./app_upload_form.html" class="flex-1 text-center text-sm font-semibold text-blue-600 bg-blue-50 border border-blue-100 rounded-xl py-3">编辑</a>
          <a href="javascript:history.back()" onclick="alert('删除成功！');" class="flex-1 text-center text-sm font-semibold text-red-600 bg-red-50 border border-red-100 rounded-xl py-3">删除</a>
        </div>
      </div>
    </div>

    <!-- Image Preview Modal -->
    <div id="previewModal" class="fixed inset-0 bg-black/90 z-[60] hidden flex-col items-center justify-center" onclick="closePreview()">
        <div class="absolute top-4 right-4 text-white p-2 cursor-pointer" onclick="closePreview()">
            <i class="fa-solid fa-xmark text-2xl"></i>
        </div>
        <img src="https://via.placeholder.com/600x800?text=proof.png" class="max-w-[90%] max-h-[80vh] object-contain rounded-lg">
        <div class="text-white mt-4 text-sm font-medium">proof.png</div>
    </div>
  </div>

<script>
    // Eye toggle logic
    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('toggleEye');
        const eyeIcon = document.getElementById('eyeIcon');
        
        const typeEl = document.getElementById('val-type');
        const remarkEl = document.getElementById('val-remark');
        
        let isMasked = true;
        
        const data = {
            masked: { type: '运营***', remark: '用于****纠错' },
            unmasked: { type: '运营商截图', remark: '用于联系电话纠错' }
        };

        if(toggleBtn) {
            toggleBtn.addEventListener('click', function() {
                isMasked = !isMasked;
                if (isMasked) {
                    eyeIcon.classList.remove('fa-eye');
                    eyeIcon.classList.add('fa-eye-slash');
                    if(typeEl) typeEl.textContent = data.masked.type;
                    if(remarkEl) remarkEl.textContent = data.masked.remark;
                } else {
                    eyeIcon.classList.remove('fa-eye-slash');
                    eyeIcon.classList.add('fa-eye');
                    if(typeEl) typeEl.textContent = data.unmasked.type;
                    if(remarkEl) remarkEl.textContent = data.unmasked.remark;
                }
            });
        }
    });

    // Preview Modal logic
    function openPreview() {
        document.getElementById('previewModal').classList.remove('hidden');
        document.getElementById('previewModal').classList.add('flex');
    }

    function closePreview() {
        document.getElementById('previewModal').classList.add('hidden');
        document.getElementById('previewModal').classList.remove('flex');
    }
</script>
</body>
</html>
