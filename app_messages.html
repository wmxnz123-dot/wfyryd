<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息中心 - 个人专属数据空间App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; }
        .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; padding-bottom: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="mobile-view">
    <!-- Topbar -->
    <div class="bg-white px-4 py-3 flex items-center justify-between shadow-sm sticky top-0 z-50">
        <a href="app_home.html" class="text-gray-600"><i class="fa-solid fa-angle-left text-xl"></i></a>
        <h1 class="text-lg font-bold text-gray-800">消息中心</h1>
        <button class="text-sm text-gray-500 hover:text-blue-600 transition">全部已读</button>
    </div>

    <!-- Message Categories / Filters (Optional, can be used for V2) -->
    <div class="bg-white px-4 py-3 border-b border-gray-100 flex space-x-4 overflow-x-auto whitespace-nowrap scrollbar-hide">
        <span class="bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-xs font-medium border border-blue-100">全部消息</span>
        <span class="text-gray-500 px-3 py-1 rounded-full text-xs font-medium hover:bg-gray-50 transition cursor-pointer">授权告警</span>
        <span class="text-gray-500 px-3 py-1 rounded-full text-xs font-medium hover:bg-gray-50 transition cursor-pointer">数据认领</span>
        <span class="text-gray-500 px-3 py-1 rounded-full text-xs font-medium hover:bg-gray-50 transition cursor-pointer">系统通知</span>
    </div>

    <!-- Message List -->
    <div class="p-4 space-y-3">
        <!-- Abnormal Alert Message (Removed AI context) -->
        <a href="app_my_auth.html" class="block bg-red-50 rounded-xl p-4 shadow-sm border border-red-200 hover:shadow-md transition relative overflow-hidden">
            <div class="absolute top-4 right-4 w-2 h-2 bg-red-600 rounded-full animate-ping"></div>
            <div class="flex items-start">
                <div class="w-10 h-10 bg-red-100 text-red-600 rounded-full flex items-center justify-center text-lg mr-3 flex-shrink-0 mt-0.5 border border-red-200">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center mb-1 pr-4">
                        <h3 class="font-bold text-red-800 text-sm flex items-center">
                            <i class="fa-solid fa-triangle-exclamation text-red-500 mr-1.5 text-xs"></i> 授权告警
                        </h3>
                        <span class="text-[10px] text-red-400 font-medium">刚刚</span>
                    </div>
                    <p class="text-xs text-red-700 leading-relaxed mb-2">
                        检测到 <span class="font-bold">XX小额贷款公司</span> 在非工作时间（凌晨 2:30）高频拉取您的“公积金数据”和“社保数据”。
                    </p>
                    <span class="text-[10px] text-red-600 font-medium">去查看 <i class="fa-solid fa-angle-right"></i></span>
                </div>
            </div>
        </a>


        <!-- Unread Message: Data Claim -->
        <a href="app_my_data.html?tab=unclaimed" class="block bg-white rounded-xl p-4 shadow-sm border border-gray-100 hover:shadow-md transition relative overflow-hidden">
            <div class="absolute top-4 right-4 w-2 h-2 bg-red-500 rounded-full"></div>
            <div class="flex items-start">
                <div class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center text-lg mr-3 flex-shrink-0 mt-0.5">
                    <i class="fa-solid fa-download"></i>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center mb-1 pr-4">
                        <h3 class="font-bold text-gray-800 text-sm">有新数据待认领</h3>
                        <span class="text-[10px] text-gray-400">昨天 15:30</span>
                    </div>
                    <p class="text-xs text-gray-600 leading-relaxed mb-2">
                        平台为您匹配到了新的 <span class="font-medium text-gray-800">门诊就诊记录</span>，请尽快核实并认领至您的个人空间。
                    </p>
                    <span class="text-[10px] text-indigo-600 font-medium">去认领 <i class="fa-solid fa-angle-right"></i></span>
                </div>
            </div>
        </a>


        <!-- Read Message: Correction Complete -->
        <a href="app_correction_detail.html" class="block bg-white rounded-xl p-4 shadow-sm border border-gray-100 hover:shadow-md transition opacity-80">
            <div class="flex items-start">
                <div class="w-10 h-10 bg-green-50 text-green-600 rounded-full flex items-center justify-center text-lg mr-3 flex-shrink-0 mt-0.5">
                    <i class="fa-solid fa-check-circle"></i>
                </div>
                <div class="flex-1">
                    <div class="flex justify-between items-center mb-1">
                        <h3 class="font-bold text-gray-800 text-sm">数据纠错处理完成</h3>
                        <span class="text-[10px] text-gray-400">2023-10-15</span>
                    </div>
                    <p class="text-xs text-gray-500 leading-relaxed mb-2">
                        您提交的关于“户籍地址”的数据纠错申请已审核通过，数据已更正。
                    </p>
                    <span class="text-[10px] text-gray-500 font-medium">查看详情 <i class="fa-solid fa-angle-right"></i></span>
                </div>
            </div>
        </a>
        
        <!-- Bottom padding for spacing -->
        <div class="h-4"></div>
    </div>
</div>
</body>
</html>
