<script>
    function toggleAccordion(headerElement) {
        const item = headerElement.closest('.accordion-item');
        const content = item.querySelector('.accordion-content');
        const icon = item.querySelector('.accordion-icon');
        const iconContainer = item.querySelector('.rounded-full');
        
        // Toggle hidden class on content
        if (content.classList.contains('hidden')) {
            // Expand
            content.classList.remove('hidden');
            headerElement.classList.add('bg-blue-50/30');
            headerElement.classList.remove('hover:bg-gray-50');
            
            icon.classList.remove('fa-chevron-down', 'text-gray-400');
            icon.classList.add('fa-chevron-up', 'text-blue-500');
            
            iconContainer.classList.remove('bg-gray-100', 'text-gray-500');
            iconContainer.classList.add('bg-blue-100', 'text-blue-600');
        } else {
            // Collapse
            content.classList.add('hidden');
            headerElement.classList.remove('bg-blue-50/30');
            headerElement.classList.add('hover:bg-gray-50');
            
            icon.classList.remove('fa-chevron-up', 'text-blue-500');
            icon.classList.add('fa-chevron-down', 'text-gray-400');
            
            iconContainer.classList.remove('bg-blue-100', 'text-blue-600');
            iconContainer.classList.add('bg-gray-100', 'text-gray-500');
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const toggleBtn = document.getElementById('toggleEye');
        const eyeIcon = document.getElementById('eyeIcon');
        
        const name1 = document.getElementById('val-name-1');
        const cert1 = document.getElementById('val-cert-1');
        const name2 = document.getElementById('val-name-2');
        const cert2 = document.getElementById('val-cert-2');
        
        let isMasked = true;
        
        const data = {
            item1: {
                masked: { name: '张*', cert: '1042212012******34' },
                unmasked: { name: '张三三', cert: '104221201205001234' }
            },
            item2: {
                masked: { name: '张*', cert: '1000312015******78' },
                unmasked: { name: '张三三', cert: '100031201505005678' }
            }
        };

        if(toggleBtn) {
            toggleBtn.addEventListener('click', function() {
                isMasked = !isMasked;
                
                if (isMasked) {
                    eyeIcon.classList.remove('fa-eye');
                    eyeIcon.classList.add('fa-eye-slash');
                    if(name1) name1.textContent = data.item1.masked.name;
                    if(cert1) cert1.textContent = data.item1.masked.cert;
                    if(name2) name2.textContent = data.item2.masked.name;
                    if(cert2) cert2.textContent = data.item2.masked.cert;
                } else {
                    eyeIcon.classList.remove('fa-eye-slash');
                    eyeIcon.classList.add('fa-eye');
                    if(name1) name1.textContent = data.item1.unmasked.name;
                    if(cert1) cert1.textContent = data.item1.unmasked.cert;
                    if(name2) name2.textContent = data.item2.unmasked.name;
                    if(cert2) cert2.textContent = data.item2.unmasked.cert;
                }
            });
        }
    });
