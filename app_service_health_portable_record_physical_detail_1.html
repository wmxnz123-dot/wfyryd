<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体检详情 - 个人健康随身档案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; }
        .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .bg-gradient { background: linear-gradient(135deg, #22c55e 0%, #10b981 100%); }
    </style>
</head>
<body>
<div class="mobile-view">
    <div class="bg-gradient text-white p-5 pb-4 rounded-b-3xl shadow-md sticky top-0 z-50">
        <div class="flex items-center justify-between">
            <a href="app_service_health_portable_record.html" class="w-9 h-9 rounded-full bg-white/20 text-white flex items-center justify-center">
                <i class="fa-solid fa-angle-left text-xl"></i>
            </a>
            <div class="text-center">
                <h1 class="text-base font-bold tracking-wide">体检详情</h1>
                <p class="text-sm text-emerald-50 opacity-90 mt-0.5">年度体检报告</p>
            </div>
            <div class="w-9 h-9"></div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 pb-20">
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
            <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                    <div class="font-bold text-gray-900 text-sm truncate">2026 年度体检</div>
                    <div class="text-xs text-gray-500 mt-1">潍坊市体检中心</div>
                </div>
                <div class="text-xs text-gray-400 flex-shrink-0">2026/04/20</div>
            </div>

            <div class="mt-4 bg-gray-50 border border-gray-100 rounded-xl p-3 space-y-3">
                <div class="flex items-start justify-between gap-3">
                    <div class="text-xs text-gray-500 flex-shrink-0">总体结论</div>
                    <div class="text-sm font-semibold text-gray-800 text-right">建议控制体重，规律作息</div>
                </div>
                <div class="flex items-start justify-between gap-3">
                    <div class="text-xs text-gray-500 flex-shrink-0">重点关注</div>
                    <div class="text-sm font-semibold text-gray-800 text-right">血脂、肝功能</div>
                </div>
            </div>
        </div>

        <div class="mt-4 bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
            <div class="px-4 py-3 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
                <div class="font-bold text-gray-800 text-sm">体征指标</div>
                <div class="text-[10px] text-gray-400">示例数据</div>
            </div>
            <div class="divide-y divide-gray-100">
                <div class="px-4 py-3 flex items-center justify-between gap-3">
                    <div class="text-sm font-semibold text-gray-800">身高</div>
                    <div class="text-sm font-bold text-gray-900">172 cm</div>
                </div>
                <div class="px-4 py-3 flex items-center justify-between gap-3">
                    <div class="text-sm font-semibold text-gray-800">体重</div>
                    <div class="text-sm font-bold text-gray-900">74 kg</div>
                </div>
                <div class="px-4 py-3 flex items-center justify-between gap-3">
                    <div class="text-sm font-semibold text-gray-800">BMI</div>
                    <div class="text-sm font-bold text-orange-600">25.0</div>
                </div>
                <div class="px-4 py-3 flex items-center justify-between gap-3">
                    <div class="text-sm font-semibold text-gray-800">血压</div>
                    <div class="text-sm font-bold text-gray-900">128/82 mmHg</div>
                </div>
            </div>
        </div>

        <div class="mt-4 bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
            <div class="px-4 py-3 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
                <div class="font-bold text-gray-800 text-sm">重点检查结果</div>
                <div class="text-[10px] text-gray-400">示例数据</div>
            </div>
            <div class="divide-y divide-gray-100">
                <div class="px-4 py-3 flex items-center justify-between gap-3">
                    <div class="min-w-0">
                        <div class="text-sm font-semibold text-gray-800">血脂</div>
                        <div class="text-xs text-gray-500 mt-0.5">总胆固醇/甘油三酯</div>
                    </div>
                    <span class="text-[10px] font-bold px-2 py-0.5 rounded-full border bg-orange-50 text-orange-600 border-orange-100 flex-shrink-0">偏高</span>
                </div>
                <div class="px-4 py-3 flex items-center justify-between gap-3">
                    <div class="min-w-0">
                        <div class="text-sm font-semibold text-gray-800">肝功能</div>
                        <div class="text-xs text-gray-500 mt-0.5">ALT/AST</div>
                    </div>
                    <span class="text-[10px] font-bold px-2 py-0.5 rounded-full border bg-emerald-50 text-emerald-600 border-emerald-100 flex-shrink-0">正常</span>
                </div>
                <div class="px-4 py-3 flex items-center justify-between gap-3">
                    <div class="min-w-0">
                        <div class="text-sm font-semibold text-gray-800">腹部彩超</div>
                        <div class="text-xs text-gray-500 mt-0.5">肝胆胰脾肾</div>
                    </div>
                    <span class="text-[10px] font-bold px-2 py-0.5 rounded-full border bg-emerald-50 text-emerald-600 border-emerald-100 flex-shrink-0">正常</span>
                </div>
            </div>
        </div>

        <div class="mt-4 bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
            <div class="font-bold text-gray-800 text-sm">建议</div>
            <div class="text-sm text-gray-700 mt-2 leading-relaxed">建议适度控制饮食与加强运动，定期复查血脂指标；保持规律作息，避免熬夜。</div>
        </div>

        <div class="mt-4 flex gap-2">
            <a href="#" class="flex-1 text-center py-3 bg-white border border-gray-200 text-gray-700 rounded-xl font-bold hover:bg-gray-50 transition">查看原报告</a>
            <a href="#" class="flex-1 text-center py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 transition">下载PDF</a>
        </div>
    </div>
</div>
</body>
</html>
