            <!-- 平台运营分析 -->

  <div class="flex-1 flex flex-col h-full overflow-hidden relative">
    <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-10 shrink-0">
      <div class="flex items-center text-gray-500">
                <i class="fa-solid fa-arrow-left cursor-pointer hover:text-gray-800 mr-4" onclick="history.back()"></i>
                <span class="text-sm">数据服务管理 <span class="mx-2">/</span> <a href="admin_services_config.html" class="hover:text-blue-600 transition">配置数据服务</a> <span class="mx-2">/</span> <span class="text-indigo-800 font-medium">新增服务</span></span>
            </div>
  </header>

    <main class="flex-1 overflow-y-auto p-6 bg-gray-50">
      <div class="mx-auto space-y-6 pb-24">
        
        <!-- 基础信息配置 -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-6">
            <h3 class="text-base font-bold text-gray-800 mb-4 border-l-4 border-blue-500 pl-2">基础信息配置</h3>
            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">服务名称 <span class="text-red-500">*</span></label>
                    <input type="text" id="serviceName" required minlength="2" maxlength="50" placeholder="请输入服务名称" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500" onblur="checkUniqueName(this.value)">
                    <p id="nameError" class="text-indigo-500 text-xs mt-1 hidden">该服务名称已存在，请重新输入</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">图标 <span class="text-red-500">*</span></label>
                    <div class="mt-1 flex items-center">
                        <div id="iconPreview" class="w-10 h-10 rounded-lg bg-gray-100 border border-gray-200 flex items-center justify-center text-gray-400 mr-4 overflow-hidden">
                            <i class="fa-solid fa-image" id="defaultIconPlaceholder"></i>
                            <img id="uploadedIcon" src="" class="hidden w-full h-full object-cover">
                        </div>
                        <label class="cursor-pointer bg-white px-3 py-1.5 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-blue-500">
                            <span>上传图标</span>
                            <input type="file" id="iconInput" class="sr-only" accept="image/*" onchange="previewIcon(this)">
                        </label>
                        <span class="ml-3 text-xs text-gray-500">建议尺寸 100x100，支持 png/jpg/svg</span>
                    </div>
                </div>
                <div id="iconColorContainer">
                    <label class="block text-sm font-medium text-gray-700 mb-2">图标颜色 <span class="text-red-500">*</span></label>
                    <div class="flex items-center space-x-3">
                        <input type="color" id="iconColorPicker" value="#3B82F6" class="h-9 w-12 rounded border border-gray-300 cursor-pointer" oninput="updateColorHex(this.value)">
                        <input type="text" id="iconColorHex" value="#3B82F6" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm w-28 focus:outline-none focus:border-blue-500" placeholder="#000000" oninput="updateColorPicker(this.value)">
                    </div>
                </div>
                <div id="iconColorContainer2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">图标背景颜色 <span class="text-red-500">*</span></label>
                    <div class="flex items-center space-x-3">
                        <input type="color" id="iconColorPicker" value="#3B82F6" class="h-9 w-12 rounded border border-gray-300 cursor-pointer" oninput="updateColorHex(this.value)">
                        <input type="text" id="iconColorHex" value="#3B82F6" class="border border-gray-300 rounded-lg px-3 py-1.5 text-sm w-28 focus:outline-none focus:border-blue-500" placeholder="#000000" oninput="updateColorPicker(this.value)">
                    </div>
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-medium text-gray-700 mb-2">授权内容与说明 <span class="text-red-500">*</span></label>
                    <textarea id="authDescription" required minlength="10" maxlength="200" rows="3" placeholder="请输入授权内容与说明（10-50字符）" class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 resize-none"></textarea>
                </div>
            </div>
        </div>

        <!-- 授权内容配置 -->
        <div class="bg-white rounded-lg shadow-sm border border-gray-100 p-6">
            <h3 class="text-base font-bold text-gray-800 mb-4 border-l-4 border-blue-500 pl-2">授权数据目录选择 <span class="text-red-500">*</span> <span class="text-xs text-gray-400 font-normal ml-2">（可多选，至少选择一个目录）</span></h3>
            <div class="grid grid-cols-1 gap-6">
                <div>
                    <div class="border border-gray-200 rounded-lg p-4 bg-gray-50 max-h-64 overflow-y-auto" id="catalogCheckboxes">
                        <div class="grid grid-cols-2 gap-3">
                            <label class="flex items-center space-x-2 bg-white p-2 rounded border border-gray-100 hover:border-blue-300 cursor-pointer transition">
                                <input type="checkbox" name="dataCatalog" value="基础身份信息" class="rounded text-blue-500 w-4 h-4 focus:ring-blue-500">
                                <span class="text-sm text-gray-700">基础身份信息</span>
                            </label>
                            <label class="flex items-center space-x-2 bg-white p-2 rounded border border-gray-100 hover:border-blue-300 cursor-pointer transition">
                                <input type="checkbox" name="dataCatalog" value="社保信息" class="rounded text-blue-500 w-4 h-4 focus:ring-blue-500">
                                <span class="text-sm text-gray-700">社保信息</span>
                            </label>
                            <label class="flex items-center space-x-2 bg-white p-2 rounded border border-gray-100 hover:border-blue-300 cursor-pointer transition">
                                <input type="checkbox" name="dataCatalog" value="医疗健康数据（摘要）" class="rounded text-blue-500 w-4 h-4 focus:ring-blue-500">
                                <span class="text-sm text-gray-700">医疗健康数据（摘要）</span>
                            </label>
                            <label class="flex items-center space-x-2 bg-white p-2 rounded border border-gray-100 hover:border-blue-300 cursor-pointer transition">
                                <input type="checkbox" name="dataCatalog" value="房产登记信息" class="rounded text-blue-500 w-4 h-4 focus:ring-blue-500">
                                <span class="text-sm text-gray-700">房产登记信息</span>
                            </label>
                        </div>
                    </div>
                    <p id="catalogError" class="text-red-500 text-xs mt-1 hidden">可多选，请至少选择一项授权数据目录</p>
                </div>
            </div>
        </div>

      </div>
    </main>

    <!-- Bottom Fixed Actions -->
    <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 flex justify-end space-x-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
        <button class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 font-medium hover:bg-gray-50 transition" onclick="window.location.href='admin_services_config.html'">取消</button>
        <button class="px-6 py-2 bg-white border border-blue-600 text-blue-600 rounded-lg font-medium shadow-sm hover:bg-blue-50 transition" onclick="saveService('draft')">暂存</button>
        <button class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium shadow-sm hover:bg-blue-700 transition" onclick="saveService('publish')">发布服务</button>
    </div>
  </div>

  

<script>
    // 模拟唯一性校验
    const existingNames = ['办件秒批', '电子病历共享'];
    let isNameValid = true;

    function checkUniqueName(name) {
        const errorEl = document.getElementById('nameError');
        if (existingNames.includes(name.trim())) {
            errorEl.classList.remove('hidden');
            isNameValid = false;
        } else {
            errorEl.classList.add('hidden');
            isNameValid = true;
        }
    }

    function previewIcon(input) {
        const previewImg = document.getElementById('uploadedIcon');
        const placeholder = document.getElementById('defaultIconPlaceholder');
        
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewImg.classList.remove('hidden');
                placeholder.classList.add('hidden');
            }
            
            reader.readAsDataURL(input.files[0]);
        }
    }

    function updateColorHex(color) {
        document.getElementById('iconColorHex').value = color.toUpperCase();
    }

    function updateColorPicker(hex) {
        if (/^#[0-9A-F]{6}$/i.test(hex)) {
            document.getElementById('iconColorPicker').value = hex;
        }
    }

    function saveService(status) {
        // 1. 校验服务名称
        const nameInput = document.getElementById('serviceName');
        const nameVal = nameInput.value.trim();
        if (nameVal.length < 2 || nameVal.length > 50) {
            alert('服务名称需为2-50个字符');
            nameInput.focus();
            return;
        }
        checkUniqueName(nameVal);
        if (!isNameValid) {
            alert('服务名称已存在，请修改');
            nameInput.focus();
            return;
        }

        // 2. 校验图标是否上传
        const iconInput = document.getElementById('iconInput');
        if (!iconInput.files || iconInput.files.length === 0) {
            alert('请上传服务图标');
            return;
        }

        // 3. 校验授权内容与说明
        const descInput = document.getElementById('authDescription');
        const descVal = descInput.value.trim();
        if (descVal.length < 10 || descVal.length > 200) {
            alert('授权内容与说明需为10-200个字符');
            descInput.focus();
            return;
        }

        // 4. 校验授权数据目录选择 (至少一项)
        const checkboxes = document.querySelectorAll('input[name="dataCatalog"]:checked');
        const catalogError = document.getElementById('catalogError');
        if (checkboxes.length === 0) {
            catalogError.classList.remove('hidden');
            return;
        } else {
            catalogError.classList.add('hidden');
        }

        // 保存逻辑
        if (status === 'draft') {
            alert('服务已暂存（草稿）！');
        } else {
            alert('服务发布成功！');
        }
        window.location.href = 'admin_services_config.html';
    }
</script>
<script src="admin_sidebar_logic.js"></script>
