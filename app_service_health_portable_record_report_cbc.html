<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>血常规 - 个人健康随身档案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; }
        .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .bg-gradient { background: linear-gradient(135deg, #22c55e 0%, #10b981 100%); }
    </style>
</head>
<body>
<div class="mobile-view">
    <div class="bg-gradient text-white p-5 pb-4 rounded-b-3xl shadow-md sticky top-0 z-50">
        <div class="flex items-center justify-between">
            <a href="app_service_health_portable_record.html" class="w-9 h-9 rounded-full bg-white/20 text-white flex items-center justify-center">
                <i class="fa-solid fa-angle-left text-xl"></i>
            </a>
            <div class="text-center">
                <h1 class="text-base font-bold tracking-wide">血常规</h1>
                <p class="text-sm text-emerald-50 opacity-90 mt-0.5">检查报告详情</p>
            </div>
            <div class="w-9 h-9"></div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 pb-20">
        <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
            <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                    <div class="flex items-center gap-2 min-w-0">
                        <div class="w-10 h-10 bg-red-50 text-red-600 rounded-xl flex items-center justify-center flex-shrink-0">
                            <i class="fa-solid fa-file-pdf text-lg"></i>
                        </div>
                        <div class="min-w-0">
                            <div class="font-bold text-gray-900 text-sm truncate">血常规（CBC）</div>
                            <div class="text-xs text-gray-500 mt-0.5 truncate">潍坊市人民医院 · 检验科</div>
                        </div>
                    </div>
                </div>
                <div class="text-right flex-shrink-0">
                    <div class="text-xs text-gray-400">2026/05/18</div>
                </div>
            </div>
        </div>

        <div class="mt-4 bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
            <div class="px-4 py-3 bg-gray-50 border-b border-gray-100 flex items-center justify-between">
                <div class="font-bold text-gray-800 text-sm">关键指标</div>
                <div class="text-[10px] text-gray-400">单位/参考区间</div>
            </div>
            <div class="divide-y divide-gray-100">
                <div class="px-4 py-3 flex items-center justify-between gap-3">
                    <div class="min-w-0">
                        <div class="text-sm font-semibold text-gray-800">WBC 白细胞</div>
                        <div class="text-[10px] text-gray-400 mt-0.5">4.0–10.0 ×10⁹/L</div>
                    </div>
                    <div class="text-sm font-bold text-gray-900 flex-shrink-0">6.2</div>
                </div>
                <div class="px-4 py-3 flex items-center justify-between gap-3">
                    <div class="min-w-0">
                        <div class="text-sm font-semibold text-gray-800">RBC 红细胞</div>
                        <div class="text-[10px] text-gray-400 mt-0.5">4.3–5.8 ×10¹²/L</div>
                    </div>
                    <div class="text-sm font-bold text-gray-900 flex-shrink-0">4.8</div>
                </div>
                <div class="px-4 py-3 flex items-center justify-between gap-3">
                    <div class="min-w-0">
                        <div class="text-sm font-semibold text-gray-800">HGB 血红蛋白</div>
                        <div class="text-[10px] text-gray-400 mt-0.5">130–175 g/L</div>
                    </div>
                    <div class="text-sm font-bold text-gray-900 flex-shrink-0">152</div>
                </div>
                <div class="px-4 py-3 flex items-center justify-between gap-3">
                    <div class="min-w-0">
                        <div class="text-sm font-semibold text-gray-800">PLT 血小板</div>
                        <div class="text-[10px] text-gray-400 mt-0.5">125–350 ×10⁹/L</div>
                    </div>
                    <div class="text-sm font-bold text-gray-900 flex-shrink-0">236</div>
                </div>
                <div class="px-4 py-3 flex items-center justify-between gap-3">
                    <div class="min-w-0">
                        <div class="text-sm font-semibold text-gray-800">NEUT% 中性粒细胞</div>
                        <div class="text-[10px] text-gray-400 mt-0.5">40–75 %</div>
                    </div>
                    <div class="text-sm font-bold text-gray-900 flex-shrink-0">58</div>
                </div>
            </div>
        </div>

        <div class="mt-4 flex gap-2">
            <a href="#" class="flex-1 text-center py-3 bg-white border border-gray-200 text-gray-700 rounded-xl font-bold hover:bg-gray-50 transition">查看原报告</a>
            <a href="#" class="flex-1 text-center py-3 bg-green-600 text-white rounded-xl font-bold hover:bg-green-700 transition">下载PDF</a>
        </div>
    </div>
</div>
</body>
</html>
