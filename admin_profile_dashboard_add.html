<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增展示分类 - 一人一档后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col h-full shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-gray-800 shrink-0">
            <i class="fa-solid fa-cubes text-blue-500 text-2xl mr-3"></i>
            <span class="text-lg font-bold tracking-wider">一人一档后台</span>
        </div>
        <div class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1" id="sidebar-menu">
                <li>
                    <a class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition" href="admin_workbench.html">
                        <i class="fa-solid fa-desktop w-6"></i> <span class="ml-3">智能工作台</span>
                    </a>
                </li>
                <li>
                    <div class="flex items-center justify-between px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition" onclick="toggleMenu(this)">
                        <div class="flex items-center">
                            <i class="fa-solid fa-magnifying-glass w-6"></i> <span class="ml-3">数据检索管理</span>
                        </div>
                        <i class="fa-solid fa-angle-down text-xs transition-transform duration-200"></i>
                    </div>
                    <ul class="pl-14 py-2 space-y-3 text-sm hidden bg-gray-800/50">
                        <li><a class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full" href="admin_dashboard.html">数据检索</a></li>
                        <li><a class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full" href="admin_search_logs.html">短信验证记录</a></li>
                        <li><a class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full" href="admin_data_map.html">数图分析</a></li>
                    </ul>
                </li>
                <!-- 数据管理 -->
                <li>
                    <div class="flex items-center justify-between px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition" onclick="toggleMenu(this)">
                        <div class="flex items-center">
                            <i class="fa-solid fa-hand-holding-hand w-6"></i> <span class="ml-3">数据管理</span>
                        </div>
                        <i class="fa-solid fa-angle-down text-xs transition-transform duration-200"></i>
                    </div>
                    <ul class="pl-14 py-2 space-y-3 text-sm hidden bg-gray-800/50">
                        <li><a class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full" href="admin_catalog_config.html">数据目录管理</a></li>
                        <li><a class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full" href="admin_corrections.html">数据纠错处置</a></li>
                    </ul>
                </li>
                <!-- 授权管理 -->
                <li>
                    <div class="flex items-center justify-between px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition" onclick="toggleMenu(this)">
                        <div class="flex items-center">
                            <i class="fa-solid fa-shield-halved w-6"></i> <span class="ml-3">授权管理</span>
                        </div>
                        <i class="fa-solid fa-angle-down text-xs transition-transform duration-200"></i>
                    </div>
                    <ul class="pl-14 py-2 space-y-3 text-sm hidden bg-gray-800/50">
                        <li><a class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full" href="admin_auth_monitor.html">异常监控</a></li>
                        <li><a class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full" href="admin_auth_blockchain.html">可信存证</a></li>
                        <li><a class="text-gray-400 hover:text-white transition relative before:content-[''] before:absolute before:-left-4 before:top-2 before:w-2 before:h-2 before:border-2 before:border-gray-500 before:rounded-full" href="admin_auth_records.html">授权记录</a></li>
                    </ul>
                </li>
                <!-- 数据服务管理 -->
                <li>
                    <a class="flex items-center px-6 py-3 text-gray-300 hover:bg-gray-800 hover:text-white transition" href="admin_services_config.html">
                        <i class="fa-solid fa-layer-group w-6"></i> <span class="ml-3">数据服务管理</span>
                    </a>
                </li>
                <!-- 仪表盘配置 -->
                <li>
                    <a class="flex items-center px-6 py-3 text-white bg-blue-600 transition" href="admin_profile_dashboard_config.html">
                        <i class="fa-solid fa-chart-pie w-6"></i> <span class="ml-3">仪表盘配置</span>
                    </a>
                </li>
            </ul>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Topbar -->
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-10 shrink-0">
            <div class="flex items-center text-gray-500">
                <i class="fa-solid fa-arrow-left cursor-pointer hover:text-gray-800 mr-4" onclick="history.back()"></i>
                <span class="text-sm">仪表盘配置 <span class="mx-2">/</span> <a href="admin_profile_dashboard_config.html" class="hover:text-blue-600 transition">分类配置</a> <span class="mx-2">/</span> <span class="text-gray-800 font-medium">新增分类</span></span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-6 bg-gray-50 relative">
            <div class="mx-auto pb-24">
                <div class="bg-white rounded-lg shadow-sm border border-gray-100">
                    <div class="p-6 space-y-6">
                        <h3 class="text-base font-bold text-gray-800 mb-4 border-l-4 border-blue-500 pl-2">基础信息配置</h3>
                        <!-- 分类名称 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2"><span class="text-red-500 mr-1">*</span>分类名称</label>
                            <input type="text" id="categoryName" placeholder="例如：五险一金、电子证照等" class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 transition">
                        </div>

                        <!-- 展示顺序 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2"><span class="text-red-500 mr-1">*</span>展示顺序</label>
                            <input type="number" id="categoryOrder" placeholder="输入排序数字，数字越小越靠前" class="w-full border border-gray-300 rounded px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 transition">
                        </div>


                        <!-- 选择已发布目录 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2"><span class="text-red-500 mr-1">*</span>选择已发布目录 <span class="text-gray-400 text-xs font-normal ml-1">(可多选，至少选择一个目录)</span></label>
                            <div class="border border-gray-200 rounded-lg p-4 bg-gray-50 max-h-64 overflow-y-auto">
                                <div class="grid grid-cols-2 gap-3" id="catalogSelectionList">
                                    <label class="flex items-center space-x-2 bg-white p-2 rounded border border-gray-100 hover:border-blue-300 cursor-pointer transition">
                                        <input type="checkbox" value="基础身份信息" class="rounded text-blue-500">
                                        <span class="text-sm text-gray-700">基础身份信息</span>
                                    </label>
                                    <label class="flex items-center space-x-2 bg-white p-2 rounded border border-gray-100 hover:border-blue-300 cursor-pointer transition">
                                        <input type="checkbox" value="社保信息" class="rounded text-blue-500">
                                        <span class="text-sm text-gray-700">社保信息</span>
                                    </label>
                                    <label class="flex items-center space-x-2 bg-white p-2 rounded border border-gray-100 hover:border-blue-300 cursor-pointer transition">
                                        <input type="checkbox" value="医保信息" class="rounded text-blue-500">
                                        <span class="text-sm text-gray-700">医保信息</span>
                                    </label>
                                    <label class="flex items-center space-x-2 bg-white p-2 rounded border border-gray-100 hover:border-blue-300 cursor-pointer transition">
                                        <input type="checkbox" value="公积金信息" class="rounded text-blue-500">
                                        <span class="text-sm text-gray-700">公积金信息</span>
                                    </label>
                                    <label class="flex items-center space-x-2 bg-white p-2 rounded border border-gray-100 hover:border-blue-300 cursor-pointer transition">
                                        <input type="checkbox" value="不动产登记信息" class="rounded text-blue-500">
                                        <span class="text-sm text-gray-700">不动产登记信息</span>
                                    </label>
                                    <label class="flex items-center space-x-2 bg-white p-2 rounded border border-gray-100 hover:border-blue-300 cursor-pointer transition">
                                        <input type="checkbox" value="门诊就诊记录" class="rounded text-blue-500">
                                        <span class="text-sm text-gray-700">门诊就诊记录</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Bottom Fixed Actions -->
        <div class="absolute bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 flex justify-end space-x-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20">
            <button class="px-6 py-2 border border-gray-300 rounded text-gray-700 hover:bg-gray-100 transition" onclick="window.location.href='admin_profile_dashboard_config.html'">取消</button>
            <button class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 shadow-sm transition" onclick="saveCategory()">保存</button>
        </div>
    </div>

<script>
    // 模拟判断是否为编辑模式
    const urlParams = new URLSearchParams(window.location.search);
    const isEdit = urlParams.get('edit');

    if (isEdit) {
        document.getElementById('pageTitle').innerText = '编辑展示分类';
        document.getElementById('formTitle').innerText = '编辑展示分类';
        
        // Mock data for edit
        document.getElementById('categoryName').value = '五险一金';
        document.getElementById('categoryOrder').value = '1';
        // Mock checking boxes
        const checkboxes = document.querySelectorAll('#catalogSelectionList input[type="checkbox"]');
        checkboxes.forEach(cb => {
            if (cb.value === '社保信息' || cb.value === '医保信息' || cb.value === '公积金信息') {
                cb.checked = true;
            }
        });
    }

    function saveCategory() {
        const name = document.getElementById('categoryName').value.trim();
        const order = document.getElementById('categoryOrder').value.trim();
        
        if (!name) {
            alert('请输入分类名称');
            return;
        }
        if (!order) {
            alert('请输入展示顺序');
            return;
        }
        
        alert(isEdit ? '分类修改成功！' : '分类创建成功！');
        window.location.href = 'admin_profile_dashboard_config.html';
    }
</script>
<script src="admin_sidebar_logic.js"></script>
</body>
</html>
