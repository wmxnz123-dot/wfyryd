<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享记录 - 国企入职调查报告</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; }
        .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
    </style>
</head>
<body>
<div class="mobile-view">
    <div class="bg-white px-4 py-3 flex items-center justify-between border-b border-gray-100 sticky top-0 z-50">
        <a href="app_service_gq_entry_report.html" class="text-gray-600 w-8 h-8 flex items-center justify-center -ml-2">
            <i class="fa-solid fa-angle-left text-xl"></i>
        </a>
        <h1 class="text-lg font-bold text-gray-800">分享记录</h1>
        <div class="w-8 h-8"></div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 pb-10">
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 mb-4">
            <div class="flex items-center gap-2">
                <div class="w-9 h-9 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center">
                    <i class="fa-solid fa-list-check"></i>
                </div>
                <div class="flex-1">
                    <div class="font-bold text-gray-800 text-sm">国企入职调查报告</div>
                    <div class="text-xs text-gray-500">每组链接与密码有效期 24 小时，且仅支持一次性查询</div>
                </div>
            </div>
        </div>

        <div id="records" class="space-y-3"></div>
        <div id="emptyState" class="hidden bg-white rounded-xl border border-gray-100 shadow-sm p-8 text-center">
            <div class="w-16 h-16 bg-gray-100 text-gray-400 rounded-full flex items-center justify-center mx-auto mb-3">
                <i class="fa-regular fa-folder-open text-2xl"></i>
            </div>
            <div class="font-bold text-gray-800 mb-1">暂无分享记录</div>
            <div class="text-xs text-gray-500 mb-5">去生成一次分享链接与密码，再回来看记录</div>
            <a href="app_service_gq_entry_report.html" class="inline-flex items-center justify-center px-4 py-2.5 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 transition">
                去生成
            </a>
        </div>
    </div>

    <div id="shareDetailModal" class="hidden fixed inset-0 z-[70] bg-black/60 flex items-center justify-center p-5 backdrop-blur-sm transition-opacity">
        <div class="bg-white w-full max-w-[340px] rounded-2xl p-6 shadow-2xl">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-gray-800">查看分享</h3>
                <button onclick="closeShareDetailModal()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <div class="bg-orange-50 border border-orange-100 rounded-xl p-3 text-sm text-orange-600 mb-4">
                <div class="font-bold mb-1">重要提示</div>
                <div class="text-xs leading-relaxed">有效期：24 小时（生成后）</div>
                <div class="text-xs leading-relaxed">一次性：每组链接与密码仅可查询 1 次，查询成功后立即失效</div>
            </div>
            <div class="text-xs text-gray-500 mb-4">
                生成时间：<span id="detailCreatedAt" class="font-semibold text-gray-700"></span><span class="text-gray-300 mx-2">|</span>
                授权截止时间：<span id="detailExpireAt" class="font-semibold text-gray-700"></span>
            </div>
            <div class="space-y-3">
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
                    <div class="text-xs text-gray-500 mb-2">分享链接</div>
                    <div class="flex gap-2">
                        <input id="detailLink" class="flex-1 bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:border-blue-500" readonly>
                        <button onclick="copyText('detailLink')" class="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition">复制</button>
                    </div>
                </div>
                <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
                    <div class="text-xs text-gray-500 mb-2">密码</div>
                    <div class="flex gap-2">
                        <input id="detailPwd" class="flex-1 bg-white border border-gray-200 rounded-lg px-3 py-2 text-sm text-gray-800 focus:outline-none focus:border-blue-500" readonly>
                        <button onclick="copyText('detailPwd')" class="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition">复制</button>
                    </div>
                </div>
            </div>
            <button onclick="copyAllDetail()" class="w-full mt-5 bg-blue-600 text-white font-bold py-3 rounded-xl shadow-sm hover:bg-blue-700 transition">
                复制全部
            </button>
        </div>
    </div>

    <div id="cancelConfirmModal" class="hidden fixed inset-0 z-[70] bg-black/60 flex items-center justify-center p-5 backdrop-blur-sm transition-opacity">
        <div class="bg-white w-full max-w-[320px] rounded-2xl p-6 shadow-2xl text-center">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-triangle-exclamation text-3xl"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-800 mb-2">取消授权</h3>
            <p class="text-sm text-gray-500 mb-6">取消后，该分享链接与密码将立即失效。</p>
            <div class="flex space-x-3">
                <button onclick="closeCancelConfirm()" class="flex-1 py-2.5 bg-gray-100 text-gray-600 rounded-xl font-medium hover:bg-gray-200 transition">取消</button>
                <button onclick="confirmCancel()" class="flex-1 py-2.5 bg-red-600 text-white rounded-xl font-medium hover:bg-red-700 transition">确定取消</button>
            </div>
        </div>
    </div>

    <div id="usedInfoModal" class="hidden fixed inset-0 z-[70] bg-black/60 flex items-center justify-center p-5 backdrop-blur-sm transition-opacity">
        <div class="bg-white w-full max-w-[340px] rounded-2xl p-6 shadow-2xl">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-gray-800">使用信息</h3>
                <button onclick="closeUsedInfoModal()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>
            <div class="bg-gray-50 border border-gray-100 rounded-xl p-4 space-y-3 text-sm">
                <div class="flex justify-between">
                    <div class="text-gray-500">使用时间</div>
                    <div id="usedAtText" class="font-semibold text-gray-800"></div>
                </div>
                <div class="flex justify-between">
                    <div class="text-gray-500">姓名</div>
                    <div id="usedNameText" class="font-semibold text-gray-800"></div>
                </div>
                <div class="flex justify-between">
                    <div class="text-gray-500">性别</div>
                    <div id="usedGenderText" class="font-semibold text-gray-800"></div>
                </div>
            </div>
            <button onclick="closeUsedInfoModal()" class="w-full mt-5 bg-blue-600 text-white font-bold py-3 rounded-xl shadow-sm hover:bg-blue-700 transition">
                知道了
            </button>
        </div>
    </div>
</div>

<script>
    const SHARE_RECORDS_KEY = 'gqEntryShareRecords';
    let currentRecordId = null;

    function safeJsonParse(text, fallback) {
        try {
            return JSON.parse(text);
        } catch (e) {
            return fallback;
        }
    }

    function getRecords() {
        return safeJsonParse(localStorage.getItem(SHARE_RECORDS_KEY) || '[]', []);
    }

    function setRecords(records) {
        localStorage.setItem(SHARE_RECORDS_KEY, JSON.stringify(records));
    }

    function pad(n) {
        return String(n).padStart(2, '0');
    }

    function formatDate(d) {
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function calcStatus(r) {
        if (r.usedAt) return 'used';
        if (r.canceledAt) return 'revoked';
        const expireAt = new Date(r.expireAt);
        if (Date.now() > expireAt.getTime()) return 'expired';
        return 'valid';
    }

    function statusLabel(status) {
        if (status === 'valid') return { text: '有效中', cls: 'bg-green-50 text-green-600 border-green-100' };
        if (status === 'used') return { text: '已使用', cls: 'bg-blue-50 text-blue-600 border-blue-100' };
        if (status === 'revoked') return { text: '已撤销', cls: 'bg-red-50 text-red-600 border-red-100' };
        return { text: '已过期', cls: 'bg-gray-100 text-gray-500 border-gray-200' };
    }

    function render() {
        const list = getRecords();
        const container = document.getElementById('records');
        const empty = document.getElementById('emptyState');

        if (!list.length) {
            container.innerHTML = '';
            empty.classList.remove('hidden');
            return;
        }

        empty.classList.add('hidden');
        container.innerHTML = list.map(r => {
            const status = calcStatus(r);
            const sl = statusLabel(status);
            const dataText = Array.isArray(r.data) ? r.data.join('、') : '-';
            const createdAt = r.createdAt ? formatDate(new Date(r.createdAt)) : '-';
            const expireAt = r.expireAt ? formatDate(new Date(r.expireAt)) : '-';
            const validityText = `24小时（至 ${expireAt}）`;
            const actions = (() => {
                if (status === 'valid') {
                    return `
                        <button class="px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition" onclick="openShareDetail('${r.id}')">查看分享</button>
                        <button class="px-3 py-2 bg-red-50 text-red-600 border border-red-100 rounded-lg text-sm font-medium hover:bg-red-100 transition" onclick="openCancelConfirm('${r.id}')">取消授权</button>
                    `;
                }
                if (status === 'used') {
                    return `
                        <button class="px-3 py-2 bg-gray-800 text-white rounded-lg text-sm font-medium hover:bg-black transition" onclick="openUsedInfo('${r.id}')">使用信息</button>
                    `;
                }
                return '';
            })();

            return `
                <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
                    <div class="flex items-start justify-between gap-3">
                        <div class="min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <div class="font-bold text-gray-900 text-sm truncate">${r.appName || '国企入职调查报告'}</div>
                                <span class="text-[10px] px-2 py-0.5 rounded-full border ${sl.cls}">${sl.text}</span>
                            </div>
                            <div class="text-xs text-gray-500 leading-relaxed line-clamp-2">授权数据：${dataText}</div>
                        </div>
                    </div>
                    <div class="mt-3 bg-gray-50 border border-gray-100 rounded-xl p-3 text-xs text-gray-600 space-y-2">
                        <div class="flex justify-between gap-3">
                            <div class="text-gray-500">授权时间</div>
                            <div class="font-semibold text-gray-700">${createdAt}</div>
                        </div>
                        <div class="flex justify-between gap-3">
                            <div class="text-gray-500">有效期限</div>
                            <div class="font-semibold text-gray-700">${validityText}</div>
                        </div>
                    </div>
                    ${actions ? `<div class="flex gap-2 mt-3 justify-end">${actions}</div>` : ''}
                </div>
            `;
        }).join('');
    }

    function findRecord(id) {
        return getRecords().find(r => r.id === id);
    }

    function openShareDetail(id) {
        const r = findRecord(id);
        if (!r) return;
        currentRecordId = id;
        document.getElementById('detailLink').value = r.link || '';
        document.getElementById('detailPwd').value = r.pwd || '';
        document.getElementById('detailCreatedAt').textContent = r.createdAt ? formatDate(new Date(r.createdAt)) : '-';
        document.getElementById('detailExpireAt').textContent = r.expireAt ? formatDate(new Date(r.expireAt)) : '-';
        document.getElementById('shareDetailModal').classList.remove('hidden');
    }

    function closeShareDetailModal() {
        document.getElementById('shareDetailModal').classList.add('hidden');
    }

    async function copyAllDetail() {
        const link = document.getElementById('detailLink').value;
        const pwd = document.getElementById('detailPwd').value;
        const text = `分享链接：${link}\n密码：${pwd}`;
        try {
            await navigator.clipboard.writeText(text);
        } catch (e) {
            const tmp = document.createElement('textarea');
            tmp.value = text;
            tmp.style.position = 'fixed';
            tmp.style.opacity = '0';
            document.body.appendChild(tmp);
            tmp.focus();
            tmp.select();
            document.execCommand('copy');
            document.body.removeChild(tmp);
        }
    }

    async function copyText(inputId) {
        const el = document.getElementById(inputId);
        const text = el.value;
        try {
            await navigator.clipboard.writeText(text);
        } catch (e) {
            el.removeAttribute('readonly');
            el.select();
            document.execCommand('copy');
            el.setAttribute('readonly', 'true');
            window.getSelection().removeAllRanges();
        }
    }

    function openCancelConfirm(id) {
        currentRecordId = id;
        document.getElementById('cancelConfirmModal').classList.remove('hidden');
    }

    function closeCancelConfirm() {
        document.getElementById('cancelConfirmModal').classList.add('hidden');
    }

    function confirmCancel() {
        if (!currentRecordId) return;
        const list = getRecords();
        const idx = list.findIndex(r => r.id === currentRecordId);
        if (idx >= 0) {
            list[idx].canceledAt = new Date().toISOString();
            list[idx].status = 'revoked';
            setRecords(list);
        }
        closeCancelConfirm();
        render();
    }

    function openUsedInfo(id) {
        const r = findRecord(id);
        if (!r || !r.usedInfo) return;
        document.getElementById('usedAtText').textContent = r.usedAt ? formatDate(new Date(r.usedAt)) : '-';
        document.getElementById('usedNameText').textContent = r.usedInfo.name || '-';
        document.getElementById('usedGenderText').textContent = r.usedInfo.gender || '-';
        document.getElementById('usedInfoModal').classList.remove('hidden');
    }

    function closeUsedInfoModal() {
        document.getElementById('usedInfoModal').classList.add('hidden');
    }

    render();
</script>
</body>
</html>
