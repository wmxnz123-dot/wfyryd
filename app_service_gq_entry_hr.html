<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国企入职核验HR端 - 个人专属数据空间</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f3f4f6; }
        .mobile-view { max-width: 390px; margin: 0 auto; background-color: #f8fafc; min-height: 100vh; position: relative; box-shadow: 0 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .bg-gradient { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); }
    </style>
</head>
<body>
<div class="mobile-view">
    <div class="bg-gradient text-white p-5 pb-4 rounded-b-3xl shadow-md sticky top-0 z-50">
        <div class="flex items-center justify-between">
            <a href="app_home.html" class="w-9 h-9 rounded-full bg-white/20 text-white flex items-center justify-center">
                <i class="fa-solid fa-angle-left text-xl"></i>
            </a>
            <div class="text-center">
                <h1 class="text-base font-bold tracking-wide">国企入职核验HR端</h1>
                <p class="text-sm text-blue-100 opacity-90 mt-0.5">核验 · 预览 · 留存</p>
            </div>
            <div class="w-9 h-9"></div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto p-4 pb-32">
        <div class="mb-4">
            <div class="bg-white rounded-xl shadow-sm p-4 border border-gray-100">
                <div class="flex items-start gap-3 mb-4">
                    <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-blue-100 to-indigo-50 text-blue-600 flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-magnifying-glass text-sm"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-gray-800 text-sm">报告查询</div>
                        <div class="text-xs text-gray-500 mt-0.5">输入链接与密码，查询入职调查报告</div>
                        <div class="text-xs text-gray-500 mt-1 leading-relaxed">每组链接与密码有效期 24 小时，且仅支持一次性查询；如需再次查询请重新生成</div>
                    </div>
                </div>

                <div class="space-y-3">
                    <div>
                        <div class="text-xs text-gray-500 mb-1">分享链接</div>
                        <div class="relative">
                            <i class="fa-solid fa-link absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input id="linkInput" oninput="updateQueryButton()" class="w-full bg-white border border-gray-200 rounded-xl pl-9 pr-3 py-2.5 text-sm text-gray-800 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100" placeholder="粘贴分享链接">
                        </div>
                    </div>
                    <div>
                        <div class="text-xs text-gray-500 mb-1">密码</div>
                        <div class="relative">
                            <i class="fa-solid fa-key absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                            <input id="pwdInput" oninput="updateQueryButton()" class="w-full bg-white border border-gray-200 rounded-xl pl-9 pr-3 py-2.5 text-sm text-gray-800 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100" placeholder="输入密码">
                        </div>
                    </div>
                    <button id="queryBtn" onclick="handleQuery()" disabled class="w-full bg-gray-300 text-white font-bold py-3 rounded-xl shadow-sm transition cursor-not-allowed">
                        查询
                    </button>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <div class="flex items-end justify-between px-1 mb-3">
                <h3 class="font-bold text-gray-800 text-sm">报告查询记录</h3>
                <span class="text-xs text-gray-500" id="recordCount">0 条</span>
            </div>
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
                <div class="px-4 py-3 bg-gray-50 flex items-center justify-between">
                    <div class="text-xs text-gray-500 font-semibold flex items-center gap-2">
                        <i class="fa-solid fa-clock-rotate-left text-gray-400"></i>
                        <span>查询记录</span>
                    </div>
                    <div class="text-[10px] text-gray-400">仅展示近半年</div>
                </div>
                <div id="records" class="divide-y divide-gray-100"></div>
            </div>
        </div>
    </div>

    <div id="successModal" class="hidden fixed inset-0 z-[70] bg-black/60 flex items-center justify-center p-5 backdrop-blur-sm transition-opacity">
        <div class="bg-white w-full max-w-[360px] rounded-2xl p-5 shadow-2xl">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-circle-check text-xl"></i>
                    </div>
                    <div>
                        <div class="font-bold text-gray-800">查询成功</div>
                        <div class="text-xs text-gray-500">可预览与下载报告 PDF</div>
                    </div>
                </div>
                <button onclick="closeSuccessModal()" class="text-gray-400 hover:text-gray-600 w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">
                <div class="bg-orange-50 border border-orange-100 rounded-lg p-2 text-xs text-orange-600 mb-3">
                    每组链接与密码有效期 24 小时，且仅支持一次性查询；查询成功后链接立即失效
                </div>
                <div class="text-xs text-gray-500 mb-2">报告文件</div>
                <div class="bg-white border border-gray-200 rounded-xl p-3 flex items-center gap-3">
                    <div class="w-10 h-10 bg-red-50 text-red-600 rounded-xl flex items-center justify-center flex-shrink-0">
                        <i class="fa-solid fa-file-pdf text-xl"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div id="reportFileName" class="text-sm font-bold text-gray-800 truncate">国企入职调查报告.pdf</div>
                        <div class="text-[10px] text-gray-400 mt-0.5">PDF 文件</div>
                    </div>
                </div>
                <div class="flex gap-2 mt-3">
                    <a id="previewBtn" href="#" target="_blank" class="flex-1 text-center py-2.5 bg-white border border-gray-200 text-gray-700 rounded-xl font-medium hover:bg-gray-50 transition">预览</a>
                    <a id="downloadBtn" href="#" download="国企入职调查报告.pdf" class="flex-1 text-center py-2.5 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 transition">下载</a>
                </div>
            </div>
        </div>
    </div>

    <div id="tipModal" class="hidden fixed inset-0 z-[80] bg-black/60 flex items-center justify-center p-5 backdrop-blur-sm transition-opacity">
        <div class="bg-white w-full max-w-[320px] rounded-2xl p-6 shadow-2xl text-center">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-circle-info text-3xl"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-800 mb-2">提示</h3>
            <p id="tipMessage" class="text-sm text-gray-500 mb-6"></p>
            <button onclick="closeTip()" class="w-full py-2.5 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700 transition">知道了</button>
        </div>
    </div>
</div>

<script>
    const records = [];
    const usedKeys = new Set();
    const SHARE_RECORDS_KEY = 'gqEntryShareRecords';
    const PDF_DATA_URI = 'data:application/pdf;base64,JVBERi0xLjMKJcTl8uXrp/Og0MTGCjEgMCBvYmoKPDwvVHlwZS9DYXRhbG9nL1BhZ2VzIDIgMCBSPj4KZW5kb2JqCjIgMCBvYmoKPDwvVHlwZS9QYWdlcy9LaWRzWzMgMCBSXS9Db3VudCAxPj4KZW5kb2JqCjMgMCBvYmoKPDwvVHlwZS9QYWdlL1BhcmVudCAyIDAgUi9NZWRpYUJveFswIDAgMjAwIDIwMF0vQ29udGVudHMgNCAwIFI+PgplbmRvYmoKNCAwIG9iago8PC9MZW5ndGggMzQ+PnN0cmVhbQpCVAovRjEgMTIgVGYKNzIgMTQ0IFRkCihIRCDmioDmnInkuIDmrKHmlofku7YpIFRqCkVUCmVuZHN0cmVhbQplbmRvYmoKeHJlZgowIDUKMDAwMDAwMDAwMCA2NTUzNSBmIAowMDAwMDAwMDEwIDAwMDAwIG4gCjAwMDAwMDAwNTMgMDAwMDAgbiAKMDAwMDAwMDEwMCAwMDAwMCBuIAowMDAwMDAwMTY5IDAwMDAwIG4gCnRyYWlsZXIKPDwvU2l6ZSA1L1Jvb3QgMSAwIFI+PgpzdGFydHhyZWYKMjQ4CiUlRU9G';
    const DEMO_VALID_LINK = 'https://example.com/gq-entry/report?token=gq-valid-2026';
    const DEMO_EXPIRED_LINK = 'https://example.com/gq-entry/report?token=gq-expired-2026';
    const DEMO_PASSWORD = '862468';

    function maskName(name) {
        if (!name) return '-';
        if (name.length === 1) return name + '*';
        return name.slice(0, 1) + '*'.repeat(Math.min(2, name.length - 1));
    }

    function pad(n) {
        return String(n).padStart(2, '0');
    }

    function formatDate(d) {
        return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function formatDateSlash(d) {
        return `${d.getFullYear()}/${pad(d.getMonth() + 1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function normalizeReportNameFromRecord(r) {
        const raw = r?.reportName || '';
        if (!raw) return '入职调查报告';
        const m1 = raw.match(/^(.+?)入职调查报告_(\d{8})/);
        if (m1) return `${m1[1]}入职调查报告${m1[2]}`;
        const m2 = raw.match(/^(.+?)入职调查报告_(\d{12})/);
        if (m2) return `${m2[1]}入职调查报告${m2[2].slice(0, 8)}`;
        return raw.replace(/_/g, '');
    }

    function safeJsonParse(text, fallback) {
        try {
            return JSON.parse(text);
        } catch (e) {
            return fallback;
        }
    }

    function getShareRecords() {
        return safeJsonParse(localStorage.getItem(SHARE_RECORDS_KEY) || '[]', []);
    }

    function setShareRecords(list) {
        localStorage.setItem(SHARE_RECORDS_KEY, JSON.stringify(list));
    }

    function renderRecords() {
        const threshold = new Date();
        threshold.setMonth(threshold.getMonth() - 6);
        const recent = records.filter(r => !r.ts || new Date(r.ts).getTime() >= threshold.getTime());
        records.length = 0;
        records.push(...recent);
        document.getElementById('recordCount').textContent = `${recent.length} 条`;
        const container = document.getElementById('records');
        container.innerHTML = recent.map(r => `
            <div class="px-4 py-3 flex items-center justify-between gap-3">
                <div class="flex items-center gap-3 min-w-0">
                    <div class="min-w-0">
                        <div class="flex items-center gap-2">
                            <div class="font-semibold text-gray-800 truncate">${maskName(r.name)}</div>
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded-full border ${r.gender === '女' ? 'bg-pink-50 text-pink-600 border-pink-100' : 'bg-blue-50 text-blue-600 border-blue-100'}">${r.gender || '-'}</span>
                        </div>
                    </div>
                </div>
                <div class="text-right text-xs text-gray-500 flex-shrink-0">${r.time}</div>
            </div>
        `).join('');
    }

    function showTip(message) {
        document.getElementById('tipMessage').textContent = message;
        document.getElementById('tipModal').classList.remove('hidden');
    }

    function closeTip() {
        document.getElementById('tipModal').classList.add('hidden');
    }

    function updateQueryButton() {
        const link = document.getElementById('linkInput').value.trim();
        const pwd = document.getElementById('pwdInput').value.trim();
        const btn = document.getElementById('queryBtn');
        const enabled = Boolean(link) && Boolean(pwd);
        if (enabled) {
            btn.disabled = false;
            btn.className = 'w-full bg-blue-600 text-white font-bold py-3 rounded-xl shadow-sm hover:bg-blue-700 transition';
        } else {
            btn.disabled = true;
            btn.className = 'w-full bg-gray-300 text-white font-bold py-3 rounded-xl shadow-sm transition cursor-not-allowed';
        }
    }

    function openSuccessModal() {
        document.getElementById('successModal').classList.remove('hidden');
    }

    function closeSuccessModal() {
        document.getElementById('successModal').classList.add('hidden');
    }

    function handleQuery() {
        const link = document.getElementById('linkInput').value.trim();
        const pwd = document.getElementById('pwdInput').value.trim();
        if (!link || !pwd) {
            return;
        }

        if (link === DEMO_EXPIRED_LINK) {
            showTip('分享已过期');
            return;
        }

        const token = (() => {
            try {
                const u = new URL(link);
                return u.searchParams.get('token') || '';
            } catch (e) {
                return '';
            }
        })();
        if (!token) {
            showTip('链接无效');
            return;
        }

        const isPermanentDemo = link === DEMO_VALID_LINK && token === 'gq-valid-2026';
        let shareRecord = null;

        if (isPermanentDemo) {
            if (pwd !== DEMO_PASSWORD) {
                showTip('密码错误');
                return;
            }
        } else {
            const shareList = getShareRecords();
            const idx = shareList.findIndex(r => r.id === token);
            if (idx < 0) {
                showTip('链接无效');
                return;
            }
            const r = shareList[idx];
            shareRecord = r;
            if (r.pwd !== pwd) {
                showTip('密码错误');
                return;
            }
            if (r.expireAt && Date.now() > new Date(r.expireAt).getTime()) {
                showTip('分享已过期');
                return;
            }
            if (r.canceledAt) {
                showTip('分享已撤销');
                return;
            }
            if (r.usedAt) {
                showTip('该链接与密码已被使用（一次性查询），请重新生成新的链接与密码');
                return;
            }
        }

        const now = new Date();
        const namePool = ['张三', '李四', '王五', '赵六'];
        const genderPool = ['男', '女'];
        const usedInfo = {
            name: namePool[Math.floor(Math.random() * namePool.length)],
            gender: genderPool[Math.floor(Math.random() * genderPool.length)],
            time: formatDate(now)
        };

        if (!isPermanentDemo) {
            const shareList = getShareRecords();
            const idx = shareList.findIndex(r => r.id === token);
            if (idx >= 0) {
                const r = shareList[idx];
                r.usedAt = now.toISOString();
                r.status = 'used';
                r.usedInfo = { name: usedInfo.name, gender: usedInfo.gender };
                shareList[idx] = r;
                setShareRecords(shareList);
            }
        }

        records.unshift({
            name: usedInfo.name,
            gender: usedInfo.gender,
            time: usedInfo.time,
            ts: now.toISOString()
        });
        renderRecords();

        const reportTitle = isPermanentDemo ? '章三入职调查报告20260526' : normalizeReportNameFromRecord(shareRecord);
        const reportFileName = `${reportTitle}.pdf`;
        document.getElementById('reportFileName').textContent = reportFileName;
        document.getElementById('previewBtn').href = PDF_DATA_URI;
        document.getElementById('downloadBtn').href = PDF_DATA_URI;
        document.getElementById('downloadBtn').setAttribute('download', reportFileName);
        openSuccessModal();
    }

    updateQueryButton();
    renderRecords();
</script>
</body>
</html>
